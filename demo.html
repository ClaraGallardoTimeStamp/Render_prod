<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO | Timestamp Consulting | Data Quality Dashboard</title>

    <!-- 🎨 CONFIGURACIÓN DE TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#EB1C23',
                            50: '#fdf3f3', 100: '#fce4e5', 200: '#f8c2c4',
                            300: '#f39aa0', 400: '#eb4f58', 500: '#EB1C23',
                            600: '#d4151a', 700: '#b10f14', 800: '#921014', 900: '#791215',
                        },
                        navy: {
                            dark: '#2a3241'
                        },
                        warm: {
                            50: '#fcf6f6',
                            100: '#faecec',
                            200: '#f5dada',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- ⚙️ LIBRERÍAS EXTERNAS -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); } }
        @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }
        .animate-toast-progress { animation: toastProgress 5s linear forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        .pill-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 4px; background: rgba(0, 0, 0, 0.05); cursor: col-resize; user-select: none; transition: background 0.2s; }
        .dark .resizer { background: rgba(255, 255, 255, 0.05); }
        .resizer:hover, .resizer.is-resizing { background: #EB1C23; }
    </style>
</head>

<body class="bg-warm-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-200 overflow-hidden flex flex-col h-screen">

    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- MOCK DATA GENERATOR ---
        const MOCK_CATEGORIES = ["iglesia", "restaurantes", "museo", "monument", "alojamientos"];
        const EXCLUDED_FIELDS = ['id', 'palabras_clave', 'uri_clase', 'estado_publicacion', 'auditoria_estado'].map(f => f.toLowerCase());
        
        const generateMockData = () => {
            const data = [];
            const names = ["Catedral de San Juan", "Mesón El Corcho", "Museo de Bellas Artes", "Puerta de Palmas", "Hotel Zurbarán", "Parroquia de la Concepción", "Restaurante Alta Mirada", "Teatro López de Ayala"];
            
            for (let i = 1; i <= 50; i++) {
                const cat = MOCK_CATEGORIES[Math.floor(Math.random() * MOCK_CATEGORIES.length)];
                data.push({
                    id: i,
                    nombre: names[i % names.length] + " " + i,
                    direccion: "Calle Falsa " + i,
                    telefono: i % 3 === 0 ? "" : "924 000 00" + i,
                    email: i % 5 === 0 ? "" : `info@sitio${i}.com`,
                    municipio: "Badajoz",
                    long_description: "Esta es una descripción detallada para el registro " + i + ". Contiene información histórica y de interés para el turista.",
                    latitud: 38.8794,
                    longitud: -6.9706,
                    auditoria_estado: 'Sin revisar',
                    categoria: cat,
                    fecha_actualizacion: new Date().toISOString()
                });
            }
            return data;
        };

        const CATEGORY_TRANSLATIONS = {
            "iglesia": "Iglesia", "restaurantes": "Restaurantes", "museo": "Museo", "monument": "Monumento", "alojamientos": "Alojamientos"
        };

        const FIELD_TRANSLATIONS = {
            "nombre": "Nombre", "direccion": "Dirección", "telefono": "Teléfono", "email": "Email", "municipio": "Municipio", "long_description": "Descripción"
        };

        const translateField = (key) => FIELD_TRANSLATIONS[key.toLowerCase()] || key.toUpperCase();
        const getSolidColor = (percent, isDark) => {
            if (percent <= 30) return isDark ? '#f87171' : '#dc2626';
            if (percent >= 100) return isDark ? '#34d399' : '#059669';
            const hue = ((percent - 30) / 70) * 120;
            return `hsl(${hue}, ${isDark ? '40%' : '50%'}, ${isDark ? '55%' : '45%'})`;
        };
        const getPastelColor = (percent, isDark) => {
            const hue = percent <= 30 ? 0 : percent >= 100 ? 150 : ((percent - 30) / 70) * 120;
            return `hsla(${hue}, ${isDark ? '35%' : '40%'}, 50%, ${isDark ? '0.12' : '0.06'})`;
        };

        function Dashboard({ userEmail, onLogout }) {
            const [isDark, setIsDark] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard');
            const [tableFilter, setTableFilter] = useState('');
            const [allData, setAllData] = useState(generateMockData());
            const [tableSearch, setTableSearch] = useState('');
            const [showOnlyIncomplete, setShowOnlyIncomplete] = useState(false);
            const [selectedRecord, setSelectedRecord] = useState(null);
            const [toast, setToast] = useState(null);
            const [nameWidth, setNameWidth] = useState(240);
            
            const donutChartRef = useRef(null);
            const donutChartInstance = useRef(null);

            useEffect(() => {
                const root = document.documentElement;
                if (isDark) root.classList.add('dark'); else root.classList.remove('dark');
            }, [isDark]);

            const processedRows = useMemo(() => {
                let data = tableFilter ? allData.filter(d => d.categoria === tableFilter) : allData;
                return data.map(row => {
                    const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()) && k !== 'categoria' && k !== 'fecha_actualizacion');
                    let filledCount = 0;
                    editableKeys.forEach(k => { if (row[k] && row[k].toString().trim() !== '') filledCount++; });
                    const percent = Math.round((filledCount / editableKeys.length) * 100);
                    const isComplete = filledCount === editableKeys.length;
                    return { ...row, _meta: { nombreValor: row.nombre, numCampos: editableKeys.length, missingFieldsCount: editableKeys.length - filledCount, percent, editableKeys, isComplete, fechaMod: new Date(row.fecha_actualizacion).toLocaleDateString() } };
                });
            }, [allData, tableFilter]);

            const dashboardStats = useMemo(() => {
                const total = processedRows.length;
                const complete = processedRows.filter(r => r._meta.isComplete).length;
                const enRevision = processedRows.filter(r => r.auditoria_estado === 'En revisión' && !r._meta.isComplete).length;
                const incomplete = total - complete - enRevision;
                return { total, complete, enRevision, incomplete, percentComplete: total === 0 ? 0 : Math.round((complete / total) * 100) };
            }, [processedRows]);

            const summaryByCategory = useMemo(() => {
                return MOCK_CATEGORIES.map(cat => {
                    const catRows = allData.filter(d => d.categoria === cat);
                    const complete = catRows.filter(r => {
                        const keys = Object.keys(r).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()) && k !== 'categoria' && k !== 'fecha_actualizacion');
                        return keys.every(k => r[k] && r[k].toString().trim() !== '');
                    }).length;
                    return { name: cat, percent: Math.round((complete / catRows.length) * 100) || 0 };
                }).sort((a,b) => b.percent - a.percent);
            }, [allData]);

            useEffect(() => {
                if (currentView !== 'dashboard') return;
                const ctx = donutChartRef.current?.getContext('2d');
                if (ctx) {
                    if (donutChartInstance.current) donutChartInstance.current.destroy();
                    donutChartInstance.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Completos', 'En Revisión', 'Incompletos'],
                            datasets: [{
                                data: [dashboardStats.complete, dashboardStats.enRevision, dashboardStats.incomplete],
                                backgroundColor: [isDark ? '#34d399' : '#059669', isDark ? '#fbbf24' : '#d97706', isDark ? '#f87171' : '#dc2626'],
                                borderWidth: 0, cutout: '80%'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [dashboardStats, isDark, currentView]);

            const handleAudit = () => {
                const id = selectedRecord.id;
                setAllData(prev => prev.map(r => r.id === id ? {...r, auditoria_estado: 'En revisión'} : r));
                setToast({ type: 'success', message: 'Registro puesto "En revisión" (Simulado)' });
                setTimeout(() => setToast(null), 3000);
                setSelectedRecord(null);
            };

            const filteredRows = processedRows.filter(r => 
                r._meta.nombreValor.toLowerCase().includes(tableSearch.toLowerCase()) &&
                (showOnlyIncomplete ? !r._meta.isComplete : true)
            );

            return (
                <div className="flex flex-col h-screen relative">
                    {/* TOAST */}
                    {toast && (
                        <div className="fixed top-20 right-6 z-[100] bg-white dark:bg-gray-800 shadow-2xl rounded-xl overflow-hidden flex flex-col min-w-[300px] border border-warm-100 dark:border-gray-700 slide-up">
                            <div className="p-4 flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 shrink-0">
                                    <i className="ph-fill ph-check-circle text-xl"></i>
                                </div>
                                <span className="text-sm font-bold">{toast.message}</span>
                            </div>
                            <div className="h-1 bg-green-500 animate-toast-progress"></div>
                        </div>
                    )}

                    <header className="h-14 bg-navy-dark border-b-[3px] border-primary flex items-center justify-between px-5 z-30 shrink-0 shadow-md">
                        <div className="flex items-center space-x-5">
                            <span className="text-white font-serif font-bold text-lg tracking-tight">DEMO Auditoría Badajoz</span>
                        </div>
                        <div className="flex items-center space-x-3 text-white text-xs">
                            <span className="bg-slate-700 px-3 py-1 rounded-full border border-slate-600">{userEmail}</span>
                            <button onClick={onLogout} className="hover:text-primary transition-colors"><i className="ph ph-power text-xl"></i></button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        <aside className="w-64 bg-white dark:bg-gray-800 border-r border-warm-100 dark:border-gray-700 flex flex-col shrink-0">
                            <div className="p-4 space-y-4">
                                <div>
                                    <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest block mb-2">Filtro Categoría</label>
                                    <select className="w-full p-2 rounded-lg bg-warm-50 dark:bg-gray-900 border border-warm-200 dark:border-gray-700 text-xs font-bold outline-none" 
                                        value={tableFilter} onChange={e => { setTableFilter(e.target.value); setCurrentView('data'); }}>
                                        <option value="">Vista Global</option>
                                        {MOCK_CATEGORIES.map(c => <option key={c} value={c}>{CATEGORY_TRANSLATIONS[c]}</option>)}
                                    </select>
                                </div>
                                <nav className="space-y-1">
                                    <button onClick={() => {setCurrentView('dashboard'); setTableFilter('');}} className={`w-full flex items-center px-3 py-2 text-xs font-bold rounded-lg ${currentView==='dashboard' ? 'bg-primary/10 text-primary' : 'text-gray-500'}`}>
                                        <i className="ph ph-house-line text-lg mr-3"></i> Dashboard
                                    </button>
                                    <button onClick={() => setCurrentView('data')} className={`w-full flex items-center px-3 py-2 text-xs font-bold rounded-lg ${currentView==='data' ? 'bg-primary/10 text-primary' : 'text-gray-500'}`}>
                                        <i className="ph ph-database text-lg mr-3"></i> Tabla de Datos
                                    </button>
                                </nav>
                            </div>
                            <div className="mt-auto p-4 border-t dark:border-gray-700 flex justify-between items-center">
                                <span className="text-[10px] font-black uppercase text-gray-400">Modo Oscuro</span>
                                <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-lg bg-warm-50 dark:bg-gray-900 text-gray-400">
                                    {isDark ? <i className="ph-fill ph-moon"></i> : <i className="ph-fill ph-sun"></i>}
                                </button>
                            </div>
                        </aside>

                        <main className="flex-1 overflow-y-auto p-6 bg-transparent dark:bg-gray-900/40 custom-scrollbar">
                            {currentView === 'dashboard' ? (
                                <div className="max-w-5xl mx-auto space-y-6 fade-in">
                                    <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-warm-100 dark:border-gray-700">
                                        <h2 className="text-2xl font-black mb-2 tracking-tight">Ecosistema de Calidad (Demo)</h2>
                                        <p className="text-sm text-gray-500 dark:text-gray-400">Datos simulados para pruebas de interfaz y flujo de usuario.</p>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 p-8 rounded-2xl border border-warm-100 dark:border-gray-700 flex flex-col md:flex-row items-center gap-10">
                                        <div className="relative h-40 w-40">
                                            <canvas ref={donutChartRef}></canvas>
                                            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                                <span className="text-3xl font-black">{dashboardStats.percentComplete}%</span>
                                            </div>
                                        </div>
                                        <div className="flex-1 grid grid-cols-2 lg:grid-cols-4 gap-4 w-full">
                                            <div className="p-4 rounded-xl bg-green-500/5 border border-green-500/20">
                                                <div className="text-[10px] font-black text-green-500 uppercase mb-1">Completos</div>
                                                <div className="text-2xl font-black text-green-600">{dashboardStats.complete}</div>
                                            </div>
                                            <div className="p-4 rounded-xl bg-amber-500/5 border border-amber-500/20">
                                                <div className="text-[10px] font-black text-amber-500 uppercase mb-1">En Revisión</div>
                                                <div className="text-2xl font-black text-amber-600">{dashboardStats.enRevision}</div>
                                            </div>
                                            <div className="p-4 rounded-xl bg-red-500/5 border border-red-500/20">
                                                <div className="text-[10px] font-black text-red-500 uppercase mb-1">Incompletos</div>
                                                <div className="text-2xl font-black text-red-600">{dashboardStats.incomplete}</div>
                                            </div>
                                            <div className="p-4 rounded-xl bg-blue-500/5 border border-blue-500/20">
                                                <div className="text-[10px] font-black text-blue-500 uppercase mb-1">Total</div>
                                                <div className="text-2xl font-black text-blue-600">{dashboardStats.total}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-warm-100 dark:border-gray-700">
                                        <h4 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Salud por Categoría</h4>
                                        <div className="flex flex-wrap gap-2">
                                            {summaryByCategory.map(cat => (
                                                <button key={cat.name} onClick={() => {setTableFilter(cat.name); setCurrentView('data');}} 
                                                    className="px-4 py-2 rounded-xl border border-gray-100 dark:border-gray-700 flex items-center gap-3 hover:shadow-md transition-all"
                                                    style={{backgroundColor: getPastelColor(cat.percent, isDark)}}>
                                                    <span className="text-xs font-bold">{CATEGORY_TRANSLATIONS[cat.name]}</span>
                                                    <span className="text-[10px] font-black px-2 py-0.5 rounded-lg text-white" style={{backgroundColor: getSolidColor(cat.percent, isDark)}}>{cat.percent}%</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col space-y-4 fade-in">
                                    <div className="flex flex-col md:flex-row justify-between items-center bg-white dark:bg-gray-800 p-4 rounded-xl gap-4">
                                        <div className="flex items-center gap-4 w-full md:w-auto">
                                            <div className="relative flex-1 md:w-80">
                                                <i className="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                                                <input type="text" placeholder="Buscar por nombre..." value={tableSearch} onChange={e=>setTableSearch(e.target.value)}
                                                    className="w-full pl-10 pr-4 py-2 rounded-xl border border-warm-200 dark:border-gray-700 bg-warm-50 dark:bg-gray-900 text-xs font-bold outline-none" />
                                            </div>
                                            <label className="flex items-center gap-2 text-[10px] font-black uppercase text-gray-400 cursor-pointer">
                                                <input type="checkbox" checked={showOnlyIncomplete} onChange={e=>setShowOnlyIncomplete(e.target.checked)} className="rounded text-primary" />
                                                <span>Faltantes</span>
                                            </label>
                                        </div>
                                        <button onClick={() => alert('Exportación Excel (Simulada)')} className="px-4 py-2 bg-green-600 text-white text-[11px] font-black rounded-xl shrink-0"><i className="ph-bold ph-file-xls mr-2"></i> Exportar Todo</button>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 rounded-xl border border-warm-200 dark:border-gray-700 overflow-hidden flex-1 flex flex-col">
                                        <div className="overflow-x-auto custom-scrollbar h-full">
                                            <table className="w-full text-left text-xs whitespace-nowrap">
                                                <thead className="bg-warm-50/50 dark:bg-gray-900/50 sticky top-0 font-black uppercase text-[10px] text-gray-400 border-b dark:border-gray-700">
                                                    <tr>
                                                        <th className="p-4">Estado</th>
                                                        <th className="p-4">Nombre</th>
                                                        <th className="p-4">Categoría</th>
                                                        <th className="p-4">Progreso</th>
                                                        <th className="p-4 text-center">Detalle</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y dark:divide-gray-700">
                                                    {filteredRows.map(row => (
                                                        <tr key={row.id} className="hover:bg-warm-50/50 dark:hover:bg-gray-700/20">
                                                            <td className="p-4">
                                                                <span className={`px-2 py-1 rounded-md text-[9px] font-black ${row._meta.isComplete ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`}>
                                                                    {row._meta.isComplete ? 'OK' : 'INCOMPLETO'}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 font-bold">{row.nombre}</td>
                                                            <td className="p-4 text-gray-400">{CATEGORY_TRANSLATIONS[row.categoria]}</td>
                                                            <td className="p-4">
                                                                <div className="flex items-center gap-2 w-32">
                                                                    <div className="flex-1 h-1 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                                                        <div className="h-full" style={{width: `${row._meta.percent}%`, backgroundColor: getSolidColor(row._meta.percent, isDark)}}></div>
                                                                    </div>
                                                                    <span className="text-[9px] font-black">{row._meta.percent}%</span>
                                                                </div>
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                <button onClick={() => setSelectedRecord(row)} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:text-primary"><i className="ph-bold ph-eye"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* MODAL DETALLE */}
                    {selectedRecord && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                            <div className="bg-white dark:bg-gray-800 rounded-3xl w-full max-w-4xl max-h-[80vh] overflow-hidden flex flex-col shadow-2xl animate-slide-up">
                                <div className="p-6 border-b dark:border-gray-700 flex justify-between items-center">
                                    <div>
                                        <h3 className="font-black text-xl">{selectedRecord.nombre}</h3>
                                        <p className="text-[10px] text-gray-400 uppercase tracking-widest font-black">ID: {selectedRecord.id} | {CATEGORY_TRANSLATIONS[selectedRecord.categoria]}</p>
                                    </div>
                                    <button onClick={() => setSelectedRecord(null)} className="p-2 text-gray-400 hover:text-primary"><i className="ph-bold ph-x text-2xl"></i></button>
                                </div>
                                <div className="p-6 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {selectedRecord._meta.editableKeys.map(k => (
                                        <div key={k} className={k==='long_description' ? 'md:col-span-2' : ''}>
                                            <label className="text-[9px] font-black uppercase text-gray-400 mb-1 block tracking-tighter">{translateField(k)}</label>
                                            <div className="p-3 bg-warm-50 dark:bg-gray-900 border dark:border-gray-700 rounded-xl text-xs font-bold">
                                                {selectedRecord[k] || <span className="italic opacity-30">Vacio</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6 bg-warm-50/50 dark:bg-gray-900/50 border-t dark:border-gray-700 flex justify-between items-center">
                                    <div className="text-[11px] font-black" style={{color: getSolidColor(selectedRecord._meta.percent, isDark)}}>
                                        Progreso: {selectedRecord._meta.percent}%
                                    </div>
                                    <div className="flex gap-3">
                                        <button onClick={handleAudit} className="px-6 py-2 bg-primary text-white rounded-xl text-[11px] font-black">Marcar Revisado</button>
                                        <button onClick={() => alert('Excel de Edición Generado')} className="px-6 py-2 bg-green-600 text-white rounded-xl text-[11px] font-black"><i className="ph-bold ph-microsoft-excel-logo mr-2"></i> Descargar Ficha</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [email, setEmail] = useState('');

            if (!isAuthenticated) {
                return (
                    <div className="h-full flex items-center justify-center bg-gray-900">
                        <div className="bg-white dark:bg-gray-800 p-10 rounded-[3rem] shadow-2xl w-full max-w-md border border-white/5">
                            <h2 className="text-2xl font-black text-center mb-8">DEMO Login</h2>
                            <form onSubmit={(e) => { e.preventDefault(); setIsAuthenticated(true); }} className="space-y-6">
                                <input type="text" placeholder="Usuario (Demo)" value={email} onChange={e=>setEmail(e.target.value)} required className="w-full px-6 py-4 bg-gray-900 border border-gray-700 rounded-2xl text-white font-bold text-xs outline-none focus:ring-2 focus:ring-primary" />
                                <input type="password" placeholder="Contraseña" required className="w-full px-6 py-4 bg-gray-900 border border-gray-700 rounded-2xl text-white font-bold text-xs outline-none focus:ring-2 focus:ring-primary" />
                                <button type="submit" className="w-full bg-primary py-4 rounded-2xl font-black text-white shadow-xl hover:scale-[1.02] transition-all">Acceder a la Demo</button>
                                <p className="text-center text-[9px] text-gray-500 font-black uppercase tracking-widest">Usa cualquier dato para entrar</p>
                            </form>
                        </div>
                    </div>
                );
            }
            return <Dashboard userEmail={email || 'Consultor_Demo'} onLogout={() => setIsAuthenticated(false)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
