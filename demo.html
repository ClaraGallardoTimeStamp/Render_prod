<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Consulting | Demo Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#EB1C23', 50: '#fdf3f3', 100: '#fce4e5', 200: '#f8c2c4',
                            300: '#f39aa0', 400: '#eb4f58', 500: '#EB1C23', 600: '#d4151a',
                            700: '#b10f14', 800: '#921014', 900: '#791215',
                        },
                        navy: { dark: '#1b212c' } 
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & Librerías -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-200 overflow-hidden flex flex-col h-screen">
    
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const LOGO_PATH = "./assets/logo-red.svg";

        const EXCLUDED_FIELDS = ['id', 'palabras_clave', 'uri_clase', 'estado_publicacion', 'url_web', 'app', 'uri_segittur', 'fecha_creacion', 'fecha_actualizacion', 'drupal_nid', 'nivel_1', 'nivel_2', 'nivel_3', 'nivel_4', 'nivel_5'];

        const CATEGORY_TRANSLATIONS = {
            "accessible_poi": "Punto de Interés Accesible", "alojamientos": "Alojamientos", "archeological_site": "Sitio Arqueológico",
            "atm": "Cajero Automático", "audio_guide": "Audioguía", "beach": "Playa", "bike_lane": "Carril Bici",
            "bridge": "Puente", "castle": "Castillo", "church": "Iglesia", "complementary_activities_company": "Actividades Complementarias",
            "destination_experience": "Experiencia en Destino", "educational_centre": "Centro Educativo", "equestrian_club": "Club Hípico",
            "event": "Evento", "fire_station": "Estación de Bomberos", "garden": "Jardín", "gas_station": "Gasolinera",
            "historical_or_cultural_resource": "Recurso Histórico o Cultural", "image_360": "Imagen 360", "leisure_and_culture_facility": "Instalación de Ocio y Cultura",
            "medical_service": "Servicio Médico", "miscellaneous_service": "Servicios Misceláneos", "monument": "Monumento",
            "municipio_ref": "Referencia de Municipio", "museum": "Museo", "natural_park": "Parque Natural", "natural_view_point": "Mirador Natural",
            "offer": "Oferta", "pamphlet": "Folleto", "pharmacy": "Farmacia", "photography": "Fotografía", "police_station": "Comisaría de Policía",
            "primary_care": "Atención Primaria", "restaurantes": "Restaurantes", "route": "Ruta", "shopping_mall": "Centro Comercial",
            "sport_facility": "Instalación Deportiva", "supermarket": "Supermercado", "tour_guide": "Guía Turístico",
            "tourism_destination": "Destino Turístico", "tourist_attraction_site": "Atracción Turística", "tourist_information_office": "Oficina de Turismo",
            "town_hall": "Ayuntamiento", "traditional_market": "Mercado Tradicional", "trail": "Sendero", "travel_agency": "Agencia de Viajes",
            "trivia_question": "Pregunta de Trivial", "vehicle_experience": "Experiencia en Vehículo", "vehicle_workshop": "Taller de Vehículos",
            "vernacular_architecture": "Arquitectura Vernácula", "video_360": "Video 360", "video_media": "Medio de Video",
            "virtual_visit": "Visita Virtual", "wifi_point": "Punto WiFi", "winery": "Bodega"
        };

        const getSolidColor = (percent) => {
            if (percent <= 30) return '#EB1C23'; 
            if (percent >= 100) return '#10b981'; 
            const hue = ((percent - 30) / 70) * 120;
            return `hsl(${hue}, 80%, 45%)`;
        };

        const getPastelColor = (percent) => {
            if (percent <= 30) return 'rgba(235, 28, 35, 0.15)'; 
            if (percent >= 100) return 'rgba(16, 185, 129, 0.15)'; 
            const hue = ((percent - 30) / 70) * 120;
            return `hsla(${hue}, 80%, 45%, 0.15)`;
        };

        // ========================================================================
        // 🚀 COMPONENTE DASHBOARD (VERSIÓN DEMO)
        // ========================================================================
        function Dashboard({ userEmail, onLogout }) {
            const [isDark, setIsDark] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard'); 
            const [tableFilter, setTableFilter] = useState(''); 
            const [summaryData, setSummaryData] = useState([]); 
            
            const [tableData, setTableData] = useState([]);
            const [tableSearch, setTableSearch] = useState('');
            const [showOnlyIncomplete, setShowOnlyIncomplete] = useState(false);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });
            
            const [selectedRecord, setSelectedRecord] = useState(null);

            const donutChartRef = useRef(null);
            const donutChartInstance = useRef(null);

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            // --- SIMULACIÓN DE DATOS (Sustituye al Fetch de AWS) ---
            useEffect(() => {
                // Simulamos la carga de estadísticas generales
                setTimeout(() => {
                    setSummaryData([
                        { name: "alojamientos", total: 4530, complete: 3100, incomplete: 1430 },
                        { name: "restaurantes", total: 2890, complete: 2890, incomplete: 0 },
                        { name: "museum", total: 112, complete: 50, incomplete: 62 },
                        { name: "tourist_information_office", total: 45, complete: 40, incomplete: 5 },
                        { name: "monument", total: 850, complete: 300, incomplete: 550 },
                        { name: "event", total: 120, complete: 20, incomplete: 100 },
                        { name: "beach", total: 8, complete: 8, incomplete: 0 }
                    ]);
                }, 600);
            }, []);

            useEffect(() => {
                // Simulamos la carga de una tabla específica
                if (tableFilter) {
                    setTableData([]); 
                    setSortConfig({ key: null, direction: 'asc' }); 
                    
                    setTimeout(() => {
                        const mockRows = Array.from({ length: 45 }).map((_, i) => {
                            const isComplete = Math.random() > 0.4;
                            return {
                                id: 1000 + i,
                                nombre: `Elemento de Prueba ${i + 1} - ${CATEGORY_TRANSLATIONS[tableFilter] || tableFilter}`,
                                direccion_fisica: isComplete ? `Calle de Ejemplo ${i + 1}, Badajoz` : '',
                                telefono_contacto: isComplete || Math.random() > 0.5 ? `+34 600 11 22 3${i%10}` : '',
                                correo_electronico: isComplete ? `info${i}@ejemplo.es` : '',
                                descripcion_turistica: isComplete ? `Este es un texto de prueba que simula una descripción muy larga traída desde la base de datos de AWS para el negocio número ${i}.` : '',
                                latitud: '38.8794',
                                longitud: '-6.9706',
                                fecha_actualizacion: new Date(Date.now() - Math.floor(Math.random() * 10000000000)).toISOString()
                            };
                        });
                        setTableData(mockRows);
                    }, 800);
                } else {
                    setTableData([]);
                }
            }, [tableFilter]);

            // --- RESTO DE LA LÓGICA (IDÉNTICA A LA REAL) ---
            const dashboardStats = useMemo(() => {
                if (!tableFilter) {
                    if(summaryData.length === 0) return null;
                    const total = summaryData.reduce((acc, cat) => acc + cat.total, 0);
                    return { total, complete: 'N/A', incomplete: 'N/A', percentComplete: 'N/A', isGlobal: true };
                } else {
                    if(tableData.length === 0) return null;
                    let total = tableData.length;
                    let incompleteRows = 0;

                    tableData.forEach(row => {
                        const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()));
                        let isRowIncomplete = false;
                        editableKeys.forEach(k => {
                            const val = row[k];
                            const hasValue = val !== null && val !== undefined && val.toString().trim() !== '';
                            if (!hasValue) isRowIncomplete = true;
                        });
                        if (isRowIncomplete) incompleteRows++;
                    });

                    const completeRows = total - incompleteRows;
                    const percent = total === 0 ? 0 : Math.round((completeRows / total) * 100);

                    let fieldStatsMap = {};
                    tableData.forEach(row => {
                        Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase())).forEach(k => {
                            if (!fieldStatsMap[k]) fieldStatsMap[k] = 0;
                            const val = row[k];
                            if (val !== null && val !== undefined && val.toString().trim() !== '') fieldStatsMap[k]++;
                        });
                    });

                    const fieldStats = Object.keys(fieldStatsMap)
                        .map(k => ({ name: k.charAt(0).toUpperCase() + k.slice(1).replace(/_/g, ' '), count: fieldStatsMap[k] }))
                        .sort((a,b) => b.count - a.count);

                    return { total, complete: completeRows, incomplete: incompleteRows, percentComplete: percent, fieldStats, isGlobal: false };
                }
            }, [summaryData, tableData, tableFilter]);

            const processedRows = useMemo(() => {
                let dynamicCols = []; 
                const rows = tableData.map(row => {
                    const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()));
                    if (dynamicCols.length === 0) dynamicCols = editableKeys.slice(0, 5);

                    let isRowIncomplete = false;
                    let filledCount = 0;
                    editableKeys.forEach(k => {
                        const val = row[k];
                        if (val !== null && val !== undefined && val.toString().trim() !== '') filledCount++;
                        else isRowIncomplete = true;
                    });

                    const numCampos = editableKeys.length;
                    const percent = numCampos === 0 ? 100 : Math.round((filledCount / numCampos) * 100);
                    const nombreValor = row.nombre || row.name || row.titulo || row.title || `Registro #${row.id || '-'}`;
                    
                    let fechaActualizacion = "Sin registro";
                    if (row.fecha_actualizacion) { try { fechaActualizacion = new Date(row.fecha_actualizacion).toLocaleDateString('es-ES'); } catch(e){} } 

                    return { ...row, _meta: { nombreValor, numCampos, percent, editableKeys, isComplete: !isRowIncomplete, fechaActualizacion } };
                });
                return { rows, dynamicCols };
            }, [tableData]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const filteredAndSortedRows = useMemo(() => {
                let result = processedRows.rows.filter(row => {
                    const matchesSearch = row._meta.nombreValor.toLowerCase().includes(tableSearch.toLowerCase());
                    const matchesIncomplete = showOnlyIncomplete ? !row._meta.isComplete : true;
                    return matchesSearch && matchesIncomplete;
                });

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        let aVal = a._meta[sortConfig.key] !== undefined ? a._meta[sortConfig.key] : a[sortConfig.key];
                        let bVal = b._meta[sortConfig.key] !== undefined ? b._meta[sortConfig.key] : b[sortConfig.key];
                        if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                        if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                        if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [processedRows.rows, tableSearch, showOnlyIncomplete, sortConfig]);

            // --- EXPORTACIONES EXCEL ---
            const exportTableToExcel = () => {
                if (!tableFilter || filteredAndSortedRows.length === 0) return;
                const wb = XLSX.utils.book_new(); 
                const headerStyle = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "EB1C23" } }, alignment: { horizontal: "center", vertical: "center", wrapText: true } };
                const okStyle = { font: { bold: true, color: { rgb: "10B981" } }, alignment: { horizontal: "center" } };
                const reviewStyle = { font: { bold: true, color: { rgb: "EB1C23" } }, alignment: { horizontal: "center" } };
                const centerStyle = { alignment: { horizontal: "center" } };
                const boldStyle = { font: { bold: true } };

                const headers = ["ESTADO", "PROGRESO", "NOMBRE / REFERENCIA", ...filteredAndSortedRows[0]._meta.editableKeys.map(c => c.replace(/_/g, ' ').toUpperCase())];
                const wsData = [headers.map(h => ({ v: h, t: 's', s: headerStyle }))];

                filteredAndSortedRows.forEach(r => {
                    const row = [{ v: r._meta.isComplete ? "OK" : "Revisar", t: 's', s: r._meta.isComplete ? okStyle : reviewStyle }, { v: r._meta.percent + "%", t: 's', s: centerStyle }, { v: r._meta.nombreValor, t: 's', s: boldStyle }];
                    r._meta.editableKeys.forEach(c => { row.push({ v: r[c] || "", t: 's' }); });
                    wsData.push(row);
                });

                const ws1 = XLSX.utils.aoa_to_sheet(wsData);
                ws1['!autofilter'] = { ref: `A1:${XLSX.utils.encode_col(headers.length - 1)}${wsData.length}` };
                ws1['!freeze'] = { xSplit: 3, ySplit: 1 }; 
                const cols = [{ wch: 15 }, { wch: 15 }, { wch: 45 }];
                for(let i=3; i<headers.length; i++) cols.push({ wch: 30 });
                ws1['!cols'] = cols;
                XLSX.utils.book_append_sheet(wb, ws1, "Datos_Físicos");

                const statsData = [
                    [{ v: "Métrica de Calidad", t: 's', s: headerStyle }, { v: "Valor Actual", t: 's', s: headerStyle }],
                    [{ v: "Categoría / Tabla AWS", t: 's', s: boldStyle }, { v: CATEGORY_TRANSLATIONS[tableFilter] || tableFilter, t: 's' }],
                    [{ v: "Total de Negocios Extraídos", t: 's', s: boldStyle }, { v: dashboardStats.total, t: 'n' }],
                    [{ v: "Negocios 100% Completos", t: 's', s: boldStyle }, { v: dashboardStats.complete, t: 'n' }],
                    [{ v: "Negocios Incompletos (A revisar)", t: 's', s: boldStyle }, { v: dashboardStats.incomplete, t: 'n' }],
                    [{ v: "Porcentaje de Calidad Global", t: 's', s: boldStyle }, { v: dashboardStats.percentComplete + "%", t: 's', s: okStyle }]
                ];
                const ws2 = XLSX.utils.aoa_to_sheet(statsData);
                ws2['!cols'] = [{ wch: 35 }, { wch: 25 }];
                XLSX.utils.book_append_sheet(wb, ws2, "Estadísticas_Calidad");

                XLSX.writeFile(wb, `DEMO_Auditoria_${tableFilter}.xlsx`);
            };

            const exportImportTemplate = () => {
                if (!tableFilter || processedRows.rows.length === 0) return;
                const wb = XLSX.utils.book_new();
                const sTitle = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 14 }, fill: { fgColor: { rgb: "F97316" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sSub = { font: { italic: true, color: { rgb: "333333" } }, fill: { fgColor: { rgb: "FEF3C7" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sHeadLocked = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "374151" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sHeadEditable = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "10B981" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sCellLocked = { fill: { fgColor: { rgb: "F3F4F6" } }, border: { top: {style:'thin', color:{rgb:'D1D5DB'}}, bottom: {style:'thin', color:{rgb:'D1D5DB'}}, left: {style:'thin', color:{rgb:'D1D5DB'}}, right: {style:'thin', color:{rgb:'D1D5DB'}} } };
                const sCellEditable = { fill: { fgColor: { rgb: "ECFDF5" } }, border: { top: {style:'thin', color:{rgb:'10B981'}}, bottom: {style:'thin', color:{rgb:'10B981'}}, left: {style:'thin', color:{rgb:'10B981'}}, right: {style:'thin', color:{rgb:'10B981'}} } };

                const incompleteRecords = processedRows.rows.filter(r => !r._meta.isComplete);
                if (incompleteRecords.length === 0) { alert("¡Genial! No hay datos incompletos en esta categoría para exportar."); return; }

                const wsData = [
                    [{ v: "PLANTILLA DE IMPORTACIÓN AWS - " + (CATEGORY_TRANSLATIONS[tableFilter] || tableFilter).toUpperCase(), t: 's', s: sTitle }],
                    [{ v: "Rellene las celdas en verde. NO modifique la columna ID_AWS, es necesaria para la sincronización automática.", t: 's', s: sSub }],
                    []
                ];

                const editableKeys = incompleteRecords[0]._meta.editableKeys;
                const headerRow = [{ v: "ID_AWS", t: 's', s: sHeadLocked }, { v: "NOMBRE_REFERENCIA", t: 's', s: sHeadLocked }];
                editableKeys.forEach(k => headerRow.push({ v: k.toUpperCase(), t: 's', s: sHeadEditable }));
                wsData.push(headerRow);

                incompleteRecords.forEach(r => {
                    const rowData = [{ v: r.id || "N/A", t: 's', s: sCellLocked }, { v: r._meta.nombreValor, t: 's', s: sCellLocked }];
                    editableKeys.forEach(k => { rowData.push({ v: r[k] || "", t: 's', s: sCellEditable }); });
                    wsData.push(rowData);
                });

                const ws = XLSX.utils.aoa_to_sheet(wsData);
                ws['!merges'] = [ { s: { r: 0, c: 0 }, e: { r: 0, c: editableKeys.length + 1 } }, { s: { r: 1, c: 0 }, e: { r: 1, c: editableKeys.length + 1 } } ];
                ws['!freeze'] = { xSplit: 2, ySplit: 4 }; 
                const cols = [{ wch: 10 }, { wch: 45 }];
                editableKeys.forEach(() => cols.push({ wch: 35 }));
                ws['!cols'] = cols;

                XLSX.utils.book_append_sheet(wb, ws, "Importacion_AWS");
                XLSX.writeFile(wb, `DEMO_Plantilla_${tableFilter}.xlsx`);
            };

            const exportFormToExcel = () => {
                if (!selectedRecord) return;
                const wb = XLSX.utils.book_new();
                const sTitle = { font: { bold: true, color: { rgb: "FFFFFF" }, sz: 14 }, fill: { fgColor: { rgb: "EB1C23" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sSub = { font: { italic: true, color: { rgb: "333333" } }, fill: { fgColor: { rgb: "FEF3C7" } }, alignment: { horizontal: "center", vertical: "center" }, border: { bottom: { style: 'thin', color: { rgb: "D1D5DB" } } } };
                const sInfoTitle = { font: { bold: true, color: { rgb: "4B5563" } }, alignment: { horizontal: "right" } };
                const sInfoData = { font: { bold: true, color: { rgb: "111827" } }, alignment: { horizontal: "left" } };
                const sHeadCol1 = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "1F2937" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sHeadCol2 = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "4B5563" } }, alignment: { horizontal: "center", vertical: "center" } };
                const sHeadCol3 = { font: { bold: true, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "10B981" } }, alignment: { horizontal: "center", vertical: "center" } }; 
                const sField = { font: { bold: true, color: { rgb: "374151" } }, fill: { fgColor: { rgb: "F3F4F6" } }, border: { top: {style:'thin', color:{rgb:'E5E7EB'}}, bottom: {style:'thin', color:{rgb:'E5E7EB'}} }, alignment: { vertical: "center", wrapText: true } };
                const sReadOnly = { font: { color: { rgb: "6B7280" } }, fill: { fgColor: { rgb: "FAFAFA" } }, border: { top: {style:'thin', color:{rgb:'E5E7EB'}}, bottom: {style:'thin', color:{rgb:'E5E7EB'}} }, alignment: { vertical: "center", wrapText: true } };
                const sEditable = { fill: { fgColor: { rgb: "ECFDF5" } }, border: { top: {style:'medium', color:{rgb:'10B981'}}, bottom: {style:'medium', color:{rgb:'10B981'}}, left: {style:'medium', color:{rgb:'10B981'}}, right: {style:'medium', color:{rgb:'10B981'}} }, alignment: { vertical: "center", wrapText: true } };

                const wsData = [
                    [{ v: "TIMESTAMP DATA CONSULTING - FORMULARIO DE ACTUALIZACIÓN", t: 's', s: sTitle }, null, null],
                    [{ v: "Instrucciones: Revise los datos y escriba la información faltante únicamente en la columna verde 'NUEVO VALOR'.", t: 's', s: sSub }, null, null],
                    [],
                    [{ v: "Nombre del Registro:", t: 's', s: sInfoTitle }, { v: selectedRecord._meta.nombreValor, t: 's', s: sInfoData }, null],
                    [{ v: "ID en Sistema AWS:", t: 's', s: sInfoTitle }, { v: selectedRecord.id || "N/A", t: 's', s: sInfoData }, null],
                    [],
                    [{ v: "CAMPO FÍSICO", t: 's', s: sHeadCol1 }, { v: "VALOR ACTUAL EN AWS", t: 's', s: sHeadCol2 }, { v: "NUEVO VALOR (Escriba aquí 👇)", t: 's', s: sHeadCol3 }]
                ];
                
                selectedRecord._meta.editableKeys.forEach(k => {
                    wsData.push([{ v: k.replace(/_/g, ' ').toUpperCase(), t: 's', s: sField }, { v: selectedRecord[k] || "--- VACÍO ---", t: 's', s: sReadOnly }, { v: "", t: 's', s: sEditable }]);
                });
                
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                ws['!merges'] = [ { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }, { s: { r: 1, c: 0 }, e: { r: 1, c: 2 } } ];
                ws['!cols'] = [{ wch: 30 }, { wch: 60 }, { wch: 60 }]; 
                ws['!freeze'] = { xSplit: 0, ySplit: 7 };

                XLSX.utils.book_append_sheet(wb, ws, "Hoja_de_Trabajo");
                XLSX.writeFile(wb, `DEMO_Ficha_${selectedRecord._meta.nombreValor.replace(/[^a-z0-9]/gi, '_')}.xlsx`);
            };

            // --- CHART ---
            useEffect(() => {
                const destroyCharts = () => {
                    if (donutChartInstance.current) { donutChartInstance.current.destroy(); donutChartInstance.current = null; }
                };

                if (currentView !== 'dashboard' || !dashboardStats || dashboardStats.total === 0 || dashboardStats.isGlobal) { destroyCharts(); return; }

                const textColor = isDark ? '#9ca3af' : '#6b7280';
                Chart.defaults.color = textColor;
                Chart.defaults.font.family = 'Inter';

                if (donutChartRef.current) {
                    if (donutChartInstance.current) donutChartInstance.current.destroy();

                                                <div key={field} className={isLong ? 'md:col-span-2' : ''}>
                                                    <label className="block text-sm font-bold text-gray-600 dark:text-gray-400 mb-1.5 capitalize">{field.replace(/_/g, ' ')}</label>
                                                    <div className="w-full px-4 py-3 border border-gray-200 dark:border-gray-700 rounded-xl bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 break-words shadow-sm text-sm">
                                                        {val ? val : <span className="italic text-gray-400 dark:text-gray-500">--- Dato Vacío ---</span>}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                                <div className="p-6 border-t border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 flex flex-wrap justify-between items-center gap-4">
                                    <button onClick={() => setSelectedRecord(null)} className="px-6 py-2.5 text-sm font-bold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors shadow-sm w-full sm:w-auto">
                                        Cerrar Visor
                                    </button>
                                    <button onClick={exportFormToExcel} className="px-6 py-2.5 text-sm font-bold text-white bg-green-600 hover:bg-green-700 rounded-xl shadow-md transition-colors flex items-center justify-center w-full sm:w-auto">
                                        <i className="ph-bold ph-microsoft-excel-logo mr-2 text-lg"></i> Descargar Formulario de Edición
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ========================================================================
        // 🔐 PANTALLA DE LOGIN DEMO
        // ========================================================================
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            useEffect(() => { document.documentElement.classList.add('dark'); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                // Login simulado inmediato
                setTimeout(() => { setIsAuthenticated(true); }, 500);
            };

            if (!isAuthenticated) {
                return (
                    <div className="h-full flex items-center justify-center relative overflow-hidden bg-gray-50 dark:bg-gray-900 p-4">
                        <div className="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full opacity-10 blur-3xl pointer-events-none bg-primary"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[30vw] h-[30vw] rounded-full opacity-5 blur-3xl pointer-events-none bg-blue-500"></div>
                        <div className="bg-white dark:bg-gray-800 p-10 rounded-[2rem] shadow-xl border border-gray-100 dark:border-gray-700 w-full max-w-md relative z-10 fade-in">
                            <div className="text-center mb-10 flex flex-col items-center">
                                <img src={LOGO_PATH} alt="Timestamp" className="h-12 mb-6 object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                                <div style={{display: 'none'}} className="text-3xl font-black italic tracking-tighter mb-4 text-primary">timestamp</div>
                                <h2 className="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">Bienvenido</h2>
                                <p className="text-gray-500 dark:text-gray-400 mt-2 font-medium">Versión Demo (Sin Backend)</p>
                            </div>
                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-1">Usuario</label>
                                    <input type="text" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Introduce cualquier cosa" className="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all text-gray-900 dark:text-white"/>
                                </div>
                                <button type="submit" className="w-full text-white bg-primary hover:bg-primary-600 py-3.5 rounded-xl font-bold text-lg shadow-sm transition-all mt-4 flex justify-center items-center">
                                    <i className="ph-bold ph-sign-in mr-2"></i> Acceder a la Demo
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return <Dashboard userEmail={email} onLogout={() => setIsAuthenticated(false)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
