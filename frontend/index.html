<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Consulting | Data Quality Dashboard</title>
    
    <!-- Tailwind CSS & Configuración -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#EB1C23', 50: '#fdf3f3', 100: '#fce4e5', 200: '#f8c2c4',
                            300: '#f39aa0', 400: '#eb4f58', 500: '#EB1C23', 600: '#d4151a',
                            700: '#b10f14', 800: '#921014', 900: '#791215',
                        },
                        navy: { dark: '#1b212c' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Librerías Externas -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-200 overflow-hidden flex flex-col h-screen">
    
    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // ------------------------------------------------------------------------
        // 📍 CONFIGURACIONES 
        // ------------------------------------------------------------------------
        const LOGO_PATH = "./assets/logo-red.svg";

        // Campos internos de AWS que el sistema debe ocultar e ignorar
        const EXCLUDED_FIELDS = [
            'id', 'palabras_clave', 'uri_clase', 'estado_publicacion', 'url_web', 'app',
            'uri_segittur', 'fecha_creacion', 'fecha_actualizacion', 'drupal_nid',
            'nivel_1', 'nivel_2', 'nivel_3', 'nivel_4', 'nivel_5'
        ].map(f => f.toLowerCase());

        const CATEGORY_TRANSLATIONS = {
            "accessible_poi": "Punto de Interés Accesible", "alojamientos": "Alojamientos", "archeological_site": "Sitio Arqueológico",
            "atm": "Cajero Automático", "audio_guide": "Audioguía", "beach": "Playa", "bike_lane": "Carril Bici",
            "bridge": "Puente", "castle": "Castillo", "church": "Iglesia", "complementary_activities_company": "Actividades Complementarias",
            "destination_experience": "Experiencia en Destino", "educational_centre": "Centro Educativo", "equestrian_club": "Club Hípico",
            "event": "Evento", "fire_station": "Estación de Bomberos", "garden": "Jardín", "gas_station": "Gasolinera",
            "historical_or_cultural_resource": "Recurso Histórico o Cultural", "image_360": "Imagen 360", "leisure_and_culture_facility": "Instalación de Ocio y Cultura",
            "medical_service": "Servicio Médico", "miscellaneous_service": "Servicios Misceláneos", "monument": "Monumento",
            "municipio_ref": "Referencia de Municipio", "museum": "Museo", "natural_park": "Parque Natural", "natural_view_point": "Mirador Natural",
            "offer": "Oferta", "pamphlet": "Folleto", "pharmacy": "Farmacia", "photography": "Fotografía", "police_station": "Comisaría de Policía",
            "primary_care": "Atención Primaria", "restaurantes": "Restaurantes", "route": "Ruta", "shopping_mall": "Centro Comercial",
            "sport_facility": "Instalación Deportiva", "supermarket": "Supermercado", "tour_guide": "Guía Turístico",
            "tourism_destination": "Destino Turístico", "tourist_attraction_site": "Atracción Turística", "tourist_information_office": "Oficina de Turismo",
            "town_hall": "Ayuntamiento", "traditional_market": "Mercado Tradicional", "trail": "Sendero", "travel_agency": "Agencia de Viajes",
            "trivia_question": "Pregunta de Trivial", "vehicle_experience": "Experiencia en Vehículo", "vehicle_workshop": "Taller de Vehículos",
            "vernacular_architecture": "Arquitectura Vernácula", "video_360": "Video 360", "video_media": "Medio de Video",
            "virtual_visit": "Visita Virtual", "wifi_point": "Punto WiFi", "winery": "Bodega"
        };

        // Función matemática para calcular el gradiente (Rojo 30% -> Verde 100%)
        const getGradientColor = (percent) => {
            if (percent <= 30) return '#EB1C23'; // Rojo puro si es 30 o menos
            if (percent >= 100) return '#10b981'; // Verde puro al 100
            // Interpola el hue (Tono) de 0 (Rojo) a 120 (Verde) en el rango de 30 a 100
            const hue = ((percent - 30) / 70) * 120;
            return `hsl(${hue}, 80%, 45%)`;
        };

        // ========================================================================
        // 🚀 COMPONENTE DASHBOARD PRINCIPAL
        // ========================================================================
        function Dashboard({ userEmail, token, onLogout }) {
            const [isDark, setIsDark] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard'); // 'dashboard' o 'data'
            const [tableFilter, setTableFilter] = useState(''); 
            const [summaryData, setSummaryData] = useState([]); 
            
            const [tableData, setTableData] = useState([]);
            const [tableSearch, setTableSearch] = useState('');
            const [showOnlyIncomplete, setShowOnlyIncomplete] = useState(false);
            
            const [selectedRecord, setSelectedRecord] = useState(null);

            // Ref para el gráfico Donut
            const donutChartRef = useRef(null);
            const donutChartInstance = useRef(null);

            // Toggle Tema 
            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            // Fetch Estadísticas Generales 
            useEffect(() => {
                fetch('http://localhost:3000/api/estadisticas', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.json())
                .then(data => { if (Array.isArray(data)) setSummaryData(data); })
                .catch(err => console.error("Error backend:", err));
            }, [token]);

            // Fetch de la tabla seleccionada en AWS
            useEffect(() => {
                if (tableFilter) {
                    setTableData([]); 
                    fetch(`http://localhost:3000/api/datos/${tableFilter}`, { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(res => res.json())
                    .then(data => { if (Array.isArray(data)) setTableData(data); })
                    .catch(err => console.error("Error AWS:", err));
                } else {
                    setTableData([]);
                }
            }, [tableFilter, token]);

            // Procesamiento Dinámico de los Datos (KPIs)
            const dashboardStats = useMemo(() => {
                if (!tableFilter) {
                    // MODO GLOBAL
                    if(summaryData.length === 0) return null;
                    const total = summaryData.reduce((acc, cat) => acc + cat.total, 0);
                    const complete = summaryData.reduce((acc, cat) => acc + cat.complete, 0);
                    const incomplete = total - complete;
                    const percentComplete = total === 0 ? 0 : Math.round((complete / total) * 100);
                    return { total, complete, incomplete, percentComplete, isGlobal: true };
                } else {
                    // MODO ESPECÍFICO DE TABLA
                    if(tableData.length === 0) return null;
                    let total = tableData.length;
                    let incompleteRows = 0;

                    tableData.forEach(row => {
                        const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()));
                        let isRowIncomplete = false;

                        editableKeys.forEach(k => {
                            const val = row[k];
                            const hasValue = val !== null && val !== undefined && val.toString().trim() !== '';
                            if (!hasValue) isRowIncomplete = true;
                        });
                        if (isRowIncomplete) incompleteRows++;
                    });

                    const completeRows = total - incompleteRows;
                    const percent = total === 0 ? 0 : Math.round((completeRows / total) * 100);

                    return { 
                        total, complete: completeRows, incomplete: incompleteRows, 
                        percentComplete: percent, isGlobal: false 
                    };
                }
            }, [summaryData, tableData, tableFilter]);

            // Procesamiento de Filas para la Tabla Bonita
            const processedRows = useMemo(() => {
                let dynamicCols = [];
                const rows = tableData.map(row => {
                    const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()));
                    if (dynamicCols.length === 0) dynamicCols = editableKeys.slice(0, 5);

                    let isRowIncomplete = false;
                    let filledCount = 0;
                    editableKeys.forEach(k => {
                        const val = row[k];
                        if (val !== null && val !== undefined && val.toString().trim() !== '') filledCount++;
                        else isRowIncomplete = true;
                    });

                    const numCampos = editableKeys.length;
                    const percent = numCampos === 0 ? 100 : Math.round((filledCount / numCampos) * 100);
                    const nombreValor = row.nombre || row.name || row.titulo || row.title || `Registro #${row.id || '-'}`;
                    
                    // Extraer fecha actualización
                    let fechaActualizacion = "Sin registro";
                    if (row.fecha_actualizacion) {
                        try { fechaActualizacion = new Date(row.fecha_actualizacion).toLocaleDateString('es-ES'); } catch(e){}
                    } else if (row.fecha_creacion) {
                        try { fechaActualizacion = new Date(row.fecha_creacion).toLocaleDateString('es-ES'); } catch(e){}
                    }

                    return { ...row, _meta: { nombreValor, numCampos, percent, editableKeys, isComplete: !isRowIncomplete, fechaActualizacion } };
                });
                return { rows, dynamicCols };
            }, [tableData]);

            // Filtrado del Buscador en Tabla
            const filteredRows = useMemo(() => {
                return processedRows.rows.filter(row => {
                    const matchesSearch = row._meta.nombreValor.toLowerCase().includes(tableSearch.toLowerCase());
                    const matchesIncomplete = showOnlyIncomplete ? !row._meta.isComplete : true;
                    return matchesSearch && matchesIncomplete;
                });
            }, [processedRows.rows, tableSearch, showOnlyIncomplete]);

            // Renderizado Seguro del Gráfico Donut (Chart.js)
            useEffect(() => {
                const destroyCharts = () => {
                    if (donutChartInstance.current) {
                        donutChartInstance.current.destroy();
                        donutChartInstance.current = null;
                    }
                };

                // Solo renderizar el donut si estamos en Dashboard
                if (currentView !== 'dashboard' || !dashboardStats || dashboardStats.total === 0) {
                    destroyCharts();
                    return;
                }

                const textColor = isDark ? '#9ca3af' : '#6b7280';
                Chart.defaults.color = textColor;
                Chart.defaults.font.family = 'Inter';

                if (donutChartRef.current) {
                    if (donutChartInstance.current) donutChartInstance.current.destroy();
                    donutChartInstance.current = new Chart(donutChartRef.current, {
                        type: 'doughnut',
                        data: {
                            labels: ['Completos', 'Incompletos'],
                            datasets: [{
                                data: [dashboardStats.complete, dashboardStats.incomplete],
                                backgroundColor: ['#10b981', '#EB1C23'], // verde, rojo
                                borderWidth: 0, cutout: '75%'
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: { legend: { position: 'bottom', labels: { color: textColor } } }
                        }
                    });
                }

                return destroyCharts;
            }, [dashboardStats, isDark, currentView]);

            const sortedCategories = Object.entries(CATEGORY_TRANSLATIONS).sort((a, b) => a[1].localeCompare(b[1]));

            // Función común para renderizar las 3 tarjetas de KPIs
            const renderKPICards = () => {
                if (!dashboardStats) return null;
                return (
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">Calidad {dashboardStats.isGlobal ? 'Global' : 'de la Tabla'}</p>
                                    <h3 className="text-3xl font-bold mt-1 text-gray-900 dark:text-white">{dashboardStats.percentComplete}%</h3>
                                </div>
                                <div className={`p-2 rounded-lg ${dashboardStats.percentComplete === 100 ? 'bg-green-50 text-green-600 dark:bg-green-900/20 dark:text-green-400' : 'bg-gray-50 text-gray-400 dark:bg-gray-700'}`}>
                                    <i className="ph-fill ph-check-circle text-xl"></i>
                                </div>
                            </div>
                            <div className="mt-4 w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1.5">
                                <div className="h-1.5 rounded-full transition-all duration-500" style={{ width: `${dashboardStats.percentComplete}%`, backgroundColor: getGradientColor(dashboardStats.percentComplete) }}></div>
                            </div>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">Registros Incompletos</p>
                                    <h3 className="text-3xl font-bold mt-1 text-primary">{dashboardStats.incomplete.toLocaleString()}</h3>
                                </div>
                                <div className="p-2 bg-primary-50 text-primary dark:bg-primary-900/20 rounded-lg">
                                    <i className="ph-fill ph-warning text-xl"></i>
                                </div>
                            </div>
                            <p className="text-sm text-gray-500 mt-4"><span className="text-primary font-medium">{dashboardStats.incomplete}</span> requieren atención</p>
                        </div>

                        <div className="bg-white dark:bg-gray-800 p-5 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">Total Negocios</p>
                                    <h3 className="text-3xl font-bold mt-1 text-gray-900 dark:text-white">{dashboardStats.total.toLocaleString()}</h3>
                                </div>
                                <div className="p-2 bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 rounded-lg">
                                    <i className="ph-fill ph-buildings text-xl"></i>
                                </div>
                            </div>
                            <p className="text-sm text-gray-500 mt-4">En {dashboardStats.isGlobal ? 'AWS RDS (Total)' : 'la tabla seleccionada'}</p>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-screen">
                    
                    {/* --- [ HEADER MANTENIDO ] --- */}
                    <header className="h-16 bg-navy-dark border-b-[4px] border-primary flex items-center justify-between px-6 z-30 shrink-0 shadow-sm">
                        <div className="flex items-center space-x-6">
                            <div className="flex items-center space-x-4">
                                <img src={LOGO_PATH} alt="Timestamp Logo" className="h-8 object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                                <div style={{display: 'none'}} className="text-primary text-2xl font-black italic tracking-tighter">timestamp</div>
                            </div>
                            <div className="h-8 w-px bg-gray-700 hidden sm:block"></div>
                            <div className="flex flex-col justify-center hidden sm:flex">
                                <div className="flex items-baseline space-x-2 font-serif">
                                    <span className="text-xl font-bold text-white tracking-wide">Consultor de datos turísticos Badajoz</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="flex items-center space-x-4 text-sm font-medium text-gray-300">
                            <div className="flex items-center space-x-2 bg-gray-800 px-4 py-1.5 rounded-full border border-gray-700">
                                <i className="ph ph-user text-lg"></i>
                                <span>{userEmail ? userEmail.split('@')[0] : 'Admin'}</span>
                                <button onClick={onLogout} className="ml-2 hover:text-white transition-colors" title="Cerrar sesión">
                                    <i className="ph ph-sign-out text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* --- [ CONTENEDOR PRINCIPAL CON SIDEBAR ] --- */}
                    <div className="flex-1 flex overflow-hidden relative">
                        
                        {/* SIDEBAR */}
                        <aside className="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col transition-colors duration-200 z-20 shrink-0">
                            <nav className="flex-1 p-4 space-y-1 mt-4">
                                <button onClick={() => setCurrentView('dashboard')} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${currentView === 'dashboard' ? 'text-primary bg-primary-50 dark:bg-primary-900/20' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50'}`}>
                                    <i className="ph ph-house text-lg mr-3"></i> Home
                                </button>
                                <button onClick={() => setCurrentView('data')} className={`w-full flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors ${currentView === 'data' ? 'text-primary bg-primary-50 dark:bg-primary-900/20' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50'}`}>
                                    <i className="ph ph-database text-lg mr-3"></i> Gestión de Datos
                                </button>
                            </nav>
                            <div className="p-4 border-t border-gray-200 dark:border-gray-700">
                                <div className="mt-4 flex items-center justify-between px-3">
                                    <span className="text-xs text-gray-500 font-medium">Modo Oscuro</span>
                                    <button onClick={() => setIsDark(!isDark)} className="text-gray-400 hover:text-primary transition-colors">
                                        {isDark ? <i className="ph-fill ph-moon text-xl"></i> : <i className="ph ph-sun text-xl"></i>}
                                    </button>
                                </div>
                            </div>
                        </aside>

                        {/* ÁREA DE CONTENIDO */}
                        <main className="flex-1 overflow-y-auto p-6 bg-gray-50 dark:bg-gray-900 relative">
                            
                            {/* Selector Global de Tablas */}
                            <div className="mb-6 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 flex items-center justify-between">
                                <div className="text-gray-800 dark:text-white font-semibold flex items-center">
                                    <i className="ph-fill ph-funnel text-primary mr-2 text-xl"></i> Contexto de Datos
                                </div>
                                <select 
                                    className="py-2.5 px-4 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-800 dark:text-white font-medium focus:outline-none focus:ring-2 focus:ring-primary transition-all cursor-pointer min-w-[280px] text-sm"
                                    value={tableFilter}
                                    onChange={(e) => {
                                        setTableFilter(e.target.value);
                                        if(e.target.value && currentView === 'dashboard') {
                                            setCurrentView('data'); // Redirección automática solicitada
                                        }
                                    }}
                                >
                                    <option value="">Vista Global de AWS...</option>
                                    {sortedCategories.map(([key, value]) => (
                                        <option key={key} value={key}>{value}</option>
                                    ))}
                                </select>
                            </div>

                            {/* === VISTA 1: DASHBOARD (Home) === */}
                            {currentView === 'dashboard' && dashboardStats && (
                                <div className="max-w-6xl mx-auto space-y-6 fade-in">
                                    
                                    {/* Welcome Banner (Fondo Pastel Amable) */}
                                    <div className="bg-gradient-to-r from-rose-50 to-orange-50 dark:from-gray-800 dark:to-gray-800 rounded-xl p-6 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4 border border-rose-100 dark:border-gray-700">
                                        <div>
                                            <h2 className="text-2xl font-bold mb-2 text-gray-800 dark:text-white">Auditoría de Calidad de Datos</h2>
                                            <p className="text-gray-600 dark:text-gray-300 max-w-3xl text-sm leading-relaxed">
                                                Bienvenido a la herramienta de limpieza y enriquecimiento. Aquí puedes visualizar la salud de la base de datos de <strong>Consultor de datos turísticos Badajoz</strong>, identificar carencias de información y corregirlas para mantener un sistema 100% operativo.
                                            </p>
                                        </div>
                                        <div className="hidden md:flex flex-shrink-0 bg-white/50 dark:bg-gray-700 p-3 rounded-lg backdrop-blur-sm text-primary shadow-sm border border-rose-100 dark:border-gray-600">
                                            <i className="ph ph-shield-check text-4xl"></i>
                                        </div>
                                    </div>

                                    {/* KPIs */}
                                    {renderKPICards()}

                                    {/* Gráfico Donut Único Centrado (Limpiado el bar chart) */}
                                    {!dashboardStats.isGlobal && dashboardStats.total > 0 && (
                                        <div className="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 text-center">
                                            <h4 className="text-sm font-semibold text-gray-800 dark:text-white mb-6">Completitud de la Tabla</h4>
                                            <div className="h-64 flex items-center justify-center relative">
                                                <canvas ref={donutChartRef}></canvas>
                                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-6">
                                                    <span className="text-3xl font-bold text-gray-800 dark:text-white">{dashboardStats.percentComplete}%</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Sector Summary - Listado de Tablas (Navegable a Gestión de datos) */}
                                    {dashboardStats.isGlobal && (
                                        <div className="bg-white dark:bg-gray-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 mt-2">
                                            <h4 className="text-base font-semibold text-gray-800 dark:text-white mb-4 flex items-center">
                                                <i className="ph-fill ph-chart-bar mr-2 text-primary"></i> Resumen de Impacto por Tabla
                                            </h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                                                {[...summaryData].sort((a,b) => b.total - a.total).slice(0, 15).map(cat => {
                                                    const sectorPercent = cat.total === 0 ? 0 : Math.round((cat.complete / cat.total) * 100);
                                                    const dynamicColor = getGradientColor(sectorPercent);
                                                    
                                                    return (
                                                        <div 
                                                            key={cat.name} 
                                                            className="p-4 border border-gray-100 dark:border-gray-700 rounded-xl flex flex-col bg-gray-50 dark:bg-gray-800/50 cursor-pointer hover:shadow-md hover:border-gray-300 dark:hover:border-gray-500 transition-all group" 
                                                            onClick={() => { setTableFilter(cat.name); setCurrentView('data'); }}
                                                        >
                                                            <div className="flex justify-between items-center mb-3">
                                                                <span className="font-semibold text-gray-800 dark:text-gray-200 truncate pr-2 group-hover:text-primary transition-colors">{CATEGORY_TRANSLATIONS[cat.name] || cat.name}</span>
                                                                <span className="text-xs font-black px-2 py-1 bg-white dark:bg-gray-700 rounded-md shadow-sm border border-gray-100 dark:border-gray-600" style={{ color: dynamicColor }}>
                                                                    {sectorPercent}% OK
                                                                </span>
                                                            </div>
                                                            <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 mb-3 overflow-hidden">
                                                                <div className="h-full rounded-full transition-all duration-700" style={{ width: `${sectorPercent}%`, backgroundColor: dynamicColor }}></div>
                                                            </div>
                                                            <div className="flex justify-between text-xs font-medium text-gray-500 dark:text-gray-400 mt-auto">
                                                                <span>{cat.total} registros</span>
                                                                <span className={cat.incomplete > 0 ? 'text-primary font-semibold' : ''}>{cat.incomplete} incompletos</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* === VISTA 2: GESTIÓN DE DATOS (Data Table Analítica) === */}
                            {currentView === 'data' && (
                                <div className="max-w-[1600px] mx-auto h-full flex flex-col fade-in">
                                    {!tableFilter ? (
                                        <div className="py-20 text-center flex flex-col items-center">
                                            <div className="bg-gray-200 dark:bg-gray-800 p-5 rounded-full mb-4">
                                                <i className="ph ph-database text-5xl text-gray-400"></i>
                                            </div>
                                            <h3 className="text-xl font-bold text-gray-800 dark:text-white">Esperando selección</h3>
                                            <p className="text-gray-500 dark:text-gray-400 max-w-md mt-2">Utiliza el menú superior para elegir una tabla de AWS y auditar sus datos al detalle.</p>
                                        </div>
                                    ) : (
                                        <>
                                            {/* Top KPIs replicados aquí para dar contexto */}
                                            {renderKPICards()}

                                            {/* Toolbar */}
                                            <div className="flex flex-wrap items-center justify-between mb-4 gap-4 bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700">
                                                <div className="flex items-center space-x-4 w-full sm:w-auto">
                                                    <div className="relative flex-1 sm:w-80">
                                                        <i className="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                                        <input 
                                                            type="text" 
                                                            placeholder="Buscar por nombre o referencia..." 
                                                            value={tableSearch}
                                                            onChange={(e) => setTableSearch(e.target.value)}
                                                            className="w-full pl-9 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-sm bg-gray-50 dark:bg-gray-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all text-gray-900 dark:text-gray-100"
                                                        />
                                                    </div>
                                                    <label className="flex items-center space-x-2 text-sm font-medium text-gray-700 dark:text-gray-300 cursor-pointer bg-gray-50 dark:bg-gray-900 px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg whitespace-nowrap">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={showOnlyIncomplete} 
                                                            onChange={(e) => setShowOnlyIncomplete(e.target.checked)}
                                                            className="rounded border-gray-300 text-primary focus:ring-primary bg-white dark:bg-gray-800 w-4 h-4 cursor-pointer"
                                                        />
                                                        <span>Mostrar Incompletos</span>
                                                    </label>
                                                </div>
                                            </div>

                                            {/* Table Container (Galería Bonita sin rojo chillón) */}
                                            <div className="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-sm overflow-hidden flex-1 flex flex-col">
                                                <div className="overflow-x-auto flex-1 custom-scrollbar">
                                                    <table className="w-full text-left border-collapse whitespace-nowrap text-sm">
                                                        <thead className="bg-gray-50 dark:bg-gray-900/80 text-gray-500 dark:text-gray-400 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-10 shadow-sm">
                                                            <tr>
                                                                <th className="py-4 px-6 font-semibold uppercase tracking-wider text-xs">Estado</th>
                                                                <th className="py-4 px-6 font-semibold uppercase tracking-wider text-xs">Nombre del Objeto</th>
                                                                <th className="py-4 px-6 font-semibold uppercase tracking-wider text-xs text-center">Nº Campos a Auditar</th>
                                                                <th className="py-4 px-6 font-semibold uppercase tracking-wider text-xs w-48">Progreso</th>
                                                                <th className="py-4 px-6 font-semibold uppercase tracking-wider text-xs text-center">Última Act.</th>
                                                                <th className="py-4 px-6 font-semibold uppercase tracking-wider text-xs text-center">Acción</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-100 dark:divide-gray-700/50">
                                                            {filteredRows.map((row) => {
                                                                const barColor = getGradientColor(row._meta.percent);
                                                                return (
                                                                    <tr key={row.id || Math.random()} className="hover:bg-gray-50 dark:hover:bg-gray-700/30 transition-colors group">
                                                                        {/* Estado */}
                                                                        <td className="py-4 px-6">
                                                                            <span className={`inline-flex items-center justify-center space-x-1 px-3 py-1 rounded-full text-xs font-bold w-24 ${row._meta.isComplete ? 'text-green-700 bg-green-100 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800' : 'text-primary bg-primary-50 dark:bg-primary-900/30 border border-primary-200 dark:border-primary-800'}`}>
                                                                                {row._meta.isComplete ? <i className="ph-bold ph-check"></i> : <i className="ph-bold ph-warning"></i>}
                                                                                <span>{row._meta.isComplete ? 'OK' : 'Revisar'}</span>
                                                                            </span>
                                                                        </td>
                                                                        
                                                                        {/* Nombre */}
                                                                        <td className="py-4 px-6 font-bold text-gray-900 dark:text-gray-100 truncate max-w-xs">
                                                                            {row._meta.nombreValor}
                                                                        </td>

                                                                        {/* Num Campos */}
                                                                        <td className="py-4 px-6 text-center">
                                                                            <span className="font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 px-3 py-1 rounded-md border border-gray-200 dark:border-gray-600">
                                                                                {row._meta.numCampos}
                                                                            </span>
                                                                        </td>
                                                                        
                                                                        {/* Progreso Visual */}
                                                                        <td className="py-4 px-6">
                                                                            <div className="flex items-center space-x-3">
                                                                                <span className="font-bold w-9 text-right" style={{ color: barColor }}>{row._meta.percent}%</span>
                                                                                <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2 overflow-hidden shadow-inner">
                                                                                    <div className="h-full rounded-full transition-all duration-700" style={{ width: `${row._meta.percent}%`, backgroundColor: barColor }}></div>
                                                                                </div>
                                                                            </div>
                                                                        </td>

                                                                        {/* Última actualización */}
                                                                        <td className="py-4 px-6 text-center text-gray-500 dark:text-gray-400 font-medium">
                                                                            {row._meta.fechaActualizacion}
                                                                        </td>

                                                                        {/* Acción */}
                                                                        <td className="py-4 px-6 text-center">
                                                                            <button onClick={() => setSelectedRecord(row)} className="inline-flex items-center justify-center p-2 border border-gray-300 dark:border-gray-600 shadow-sm text-sm font-medium rounded-lg text-gray-700 dark:text-gray-200 bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary dark:hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary" title="Editar y completar">
                                                                                <i className="ph-bold ph-pencil-simple text-lg"></i>
                                                                            </button>
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                            {filteredRows.length === 0 && (
                                                                <tr>
                                                                    <td colSpan="6" className="py-16 text-center">
                                                                        <i className="ph ph-magnifying-glass text-4xl text-gray-300 dark:text-gray-600 mb-3 block"></i>
                                                                        <span className="text-gray-500 font-medium">No se han encontrado registros con esos filtros.</span>
                                                                    </td>
                                                                </tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            )}
                        </main>

                    </div>

                    {/* --- [ MODAL DETALLADO DE EDICIÓN ] --- */}
                    {selectedRecord && (
                        <div className="fixed inset-0 bg-gray-900/50 dark:bg-gray-900/80 backdrop-blur-sm z-50 flex items-center justify-center fade-in p-4">
                            <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col slide-up transform transition-all border border-gray-200 dark:border-gray-700 overflow-hidden">
                                
                                <div className="flex items-center justify-between p-6 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/80">
                                    <div>
                                        <h3 className="text-xl font-bold text-gray-900 dark:text-white flex items-center">
                                            <i className="ph-fill ph-pencil-simple text-primary mr-3 text-2xl"></i>
                                            Editor de Datos AWS
                                        </h3>
                                        <p className="text-sm font-medium text-gray-500 mt-1 ml-9">Modificando: <span className="text-gray-800 dark:text-gray-300">{selectedRecord._meta.nombreValor}</span></p>
                                    </div>
                                    <button onClick={() => setSelectedRecord(null)} className="p-2 text-gray-400 hover:text-primary hover:bg-red-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
                                        <i className="ph-bold ph-x text-xl"></i>
                                    </button>
                                </div>

                                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar bg-white dark:bg-gray-800">
                                    <form className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {selectedRecord._meta.editableKeys.map((field) => (
                                                <div key={field} className={field.length > 30 || field.includes('desc') || field.includes('url') ? 'md:col-span-2' : ''}>
                                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1.5 capitalize">{field.replace(/_/g, ' ')}</label>
                                                    {field.includes('desc') || (selectedRecord[field] && selectedRecord[field].length > 60) ? (
                                                        <textarea 
                                                            defaultValue={selectedRecord[field] || ''} 
                                                            rows="4"
                                                            placeholder={`Añadir información en ${field}...`}
                                                            className="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all shadow-sm"
                                                        />
                                                    ) : (
                                                        <input 
                                                            type="text" 
                                                            defaultValue={selectedRecord[field] || ''} 
                                                            placeholder={`Añadir información...`}
                                                            className="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-xl bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all shadow-sm"
                                                        />
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </form>
                                </div>

                                <div className="p-6 border-t border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 flex justify-end space-x-3">
                                    <button onClick={() => setSelectedRecord(null)} className="px-6 py-2.5 text-sm font-bold text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors shadow-sm">
                                        Cancelar
                                    </button>
                                    <button onClick={() => setSelectedRecord(null)} className="px-6 py-2.5 text-sm font-bold text-white bg-primary hover:bg-primary-600 rounded-xl shadow-md transition-colors flex items-center">
                                        <i className="ph-bold ph-cloud-arrow-up mr-2 text-lg"></i>
                                        Sincronizar a AWS
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ========================================================================
        // 🔐 PANTALLA DE LOGIN
        // ========================================================================
        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [token, setToken] = useState('');

            // Toggle Dark Mode para el Login inicial
            useEffect(() => { document.documentElement.classList.add('dark'); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    const res = await fetch('http://localhost:3000/api/auth/login', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) { setToken(data.token); setIsAuthenticated(true); } 
                    else { setError(data.message || 'Error de acceso'); }
                } catch (err) {
                    setError('Fallo de conexión al backend local Node.js.');
                }
            };

            if (!isAuthenticated) {
                return (
                    <div className="h-full flex items-center justify-center relative overflow-hidden bg-gray-50 dark:bg-gray-900 p-4">
                        <div className="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full opacity-10 blur-3xl pointer-events-none bg-primary"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[30vw] h-[30vw] rounded-full opacity-5 blur-3xl pointer-events-none bg-blue-500"></div>
                        
                        <div className="bg-white dark:bg-gray-800 p-10 rounded-[2rem] shadow-xl border border-gray-100 dark:border-gray-700 w-full max-w-md relative z-10 fade-in">
                            <div className="text-center mb-10 flex flex-col items-center">
                                <img src={LOGO_PATH} alt="Timestamp" className="h-12 mb-6 object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }} />
                                <div style={{display: 'none'}} className="text-3xl font-black italic tracking-tighter mb-4 text-primary">timestamp</div>
                                <h2 className="text-2xl font-bold text-gray-900 dark:text-white tracking-tight">Bienvenido</h2>
                                <p className="text-gray-500 dark:text-gray-400 mt-2 font-medium">Panel de Auditoría de Datos</p>
                            </div>
                            
                            {error && ( <div className="bg-red-50 dark:bg-red-900/20 text-primary p-4 rounded-xl text-sm font-semibold mb-6 flex items-start border border-red-100 dark:border-red-900/30"><i className="ph-fill ph-warning-circle text-lg mr-2 shrink-0"></i> {error}</div> )}

                            <form onSubmit={handleSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-1">Usuario</label>
                                    <input type="text" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin" className="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all text-gray-900 dark:text-white"/>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-1">Contraseña</label>
                                    <input type="password" required value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" className="w-full px-5 py-3.5 bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-all text-gray-900 dark:text-white"/>
                                </div>
                                <button type="submit" className="w-full text-white bg-primary hover:bg-primary-600 py-3.5 rounded-xl font-bold text-lg shadow-sm transition-all mt-4 flex justify-center items-center">
                                    <i className="ph-bold ph-sign-in mr-2"></i> Entrar al Panel
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return <Dashboard userEmail={email} token={token} onLogout={() => setIsAuthenticated(false)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
