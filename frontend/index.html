<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Consulting | Data Quality Dashboard</title>

    <!-- 🎨 CONFIGURACIÓN DE TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#EB1C23',
                            50: '#fdf3f3', 100: '#fce4e5', 200: '#f8c2c4',
                            300: '#f39aa0', 400: '#eb4f58', 500: '#EB1C23',
                            600: '#d4151a', 700: '#b10f14', 800: '#921014', 900: '#791215',
                        },
                        navy: { dark: '#1b212c' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- ⚙️ LIBRERÍAS EXTERNAS -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .pill-transition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-200 overflow-hidden flex flex-col h-screen">

    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // 📍 CONFIGURACIONES
        const LOGO_PATH = "./assets/logo-red.svg";
        const BADAJOZ_LOGO_PATH = "./assets/badajoz.svg";

        const EXCLUDED_FIELDS = [
            'id', 'palabras_clave', 'uri_clase', 'estado_publicacion', 'url_web', 'app', 'accessibility_level',
            'accessibility_description', 'uri_segittur', 'fecha_creacion', 'fecha_actualizacion', 'drupal_nid',
            'nivel_1', 'nivel_2', 'nivel_3', 'nivel_4', 'nivel_5'
        ].map(f => f.toLowerCase());

        const CATEGORY_TRANSLATIONS = {
            "accessible_poi": "Punto de Interés Accesible", "alojamientos": "Alojamientos", "archeological_site": "Sitio Arqueológico",
            "atm": "Cajero Automático", "audio_guide": "Audioguía", "beach": "Playa", "bike_lane": "Carril Bici",
            "bridge": "Puente", "castle": "Castillo", "church": "Iglesia", "complementary_activities_company": "Actividades Complementarias",
            "destination_experience": "Experiencia en Destino", "educational_centre": "Centro Educativo", "equestrian_club": "Club Hípico",
            "event": "Evento", "fire_station": "Estación de Bomberos", "garden": "Jardín", "gas_station": "Gasolinera",
            "historical_or_cultural_resource": "Recurso Histórico o Cultural", "image_360": "Imagen 360", "leisure_and_culture_facility": "Instalación de Ocio y Cultura",
            "medical_service": "Servicio Médico", "miscellaneous_service": "Servicios Misceláneos", "monument": "Monumento",
            "municipio_ref": "Referencia de Municipio", "museum": "Museo", "natural_park": "Parque Natural", "natural_view_point": "Mirador Natural",
            "offer": "Oferta", "pamphlet": "Folleto", "pharmacy": "Farmacia", "photography": "Fotografía", "police_station": "Comisaría de Policía",
            "primary_care": "Atención Primaria", "restaurantes": "Restaurantes", "route": "Ruta", "shopping_mall": "Centro Comercial",
            "sport_facility": "Instalación Deportiva", "supermarket": "Supermercado", "tour_guide": "Guía Turístico",
            "tourism_destination": "Destino Turístico", "tourist_attraction_site": "Atracción Turística", "tourist_information_office": "Oficina de Turismo",
            "town_hall": "Ayuntamiento", "traditional_market": "Mercado Tradicional", "trail": "Sendero", "travel_agency": "Agencia de Viajes",
            "trivia_question": "Pregunta de Trivial", "vehicle_experience": "Experiencia en Vehículo", "vehicle_workshop": "Taller de Vehículos",
            "vernacular_architecture": "Arquitectura Vernácula", "video_360": "Video 360", "video_media": "Medio de Video",
            "virtual_visit": "Visita Virtual", "wifi_point": "Punto WiFi", "winery": "Bodega"
        };

        const getSolidColor = (percent, isDark) => {
            if (percent <= 30) return isDark ? '#f87171' : '#dc2626'; 
            if (percent >= 100) return isDark ? '#34d399' : '#059669'; 
            const hue = ((percent - 30) / 70) * 120;
            return `hsl(${hue}, ${isDark ? '45%' : '50%'}, ${isDark ? '60%' : '40%'})`;
        };

        const getPastelColor = (percent, isDark) => {
            if (percent <= 30) return isDark ? 'rgba(248, 113, 113, 0.12)' : 'rgba(220, 38, 38, 0.05)';
            if (percent >= 100) return isDark ? 'rgba(52, 211, 153, 0.12)' : 'rgba(5, 150, 105, 0.05)';
            const hue = ((percent - 30) / 70) * 120;
            return `hsla(${hue}, ${isDark ? '40%' : '45%'}, 50%, ${isDark ? '0.15' : '0.07'})`;
        };

        function Dashboard({ userEmail, token, onLogout }) {
            const [isDark, setIsDark] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard');
            const [tableFilter, setTableFilter] = useState('');
            const [selectedRecord, setSelectedRecord] = useState(null);
            const [summaryData, setSummaryData] = useState([]);
            const [tableData, setTableData] = useState([]);
            const [tableSearch, setTableSearch] = useState('');
            const [showOnlyIncomplete, setShowOnlyIncomplete] = useState(false);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const donutChartRef = useRef(null);
            const donutChartInstance = useRef(null);

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            useEffect(() => {
                fetch('http://localhost:3000/api/estadisticas', { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(res => res.json())
                    .then(data => { if (Array.isArray(data)) setSummaryData(data); })
                    .catch(err => console.error("Error backend estadísticas:", err));
            }, [token]);

            useEffect(() => {
                if (tableFilter) {
                    setTableData([]);
                    setSortConfig({ key: null, direction: 'asc' });
                    fetch(`http://localhost:3000/api/datos/${tableFilter}`, { headers: { 'Authorization': `Bearer ${token}` } })
                        .then(res => res.json())
                        .then(data => { if (Array.isArray(data)) setTableData(data); })
                        .catch(err => console.error("Error AWS datos:", err));
                }
            }, [tableFilter, token]);

            const dashboardStats = useMemo(() => {
                if (!tableFilter) {
                    if (summaryData.length === 0) return null;
                    const total = summaryData.reduce((acc, cat) => acc + (cat.total || 0), 0);
                    const complete = summaryData.reduce((acc, cat) => acc + (cat.complete || 0), 0);
                    return { total, complete, incomplete: total - complete, percentComplete: total === 0 ? 0 : Math.round((complete / total) * 100), isGlobal: true };
                } else {
                    if (tableData.length === 0) return null;
                    let total = tableData.length;
                    let incompleteRows = 0;
                    tableData.forEach(row => {
                        const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()));
                        let isRowIncomplete = false;
                        editableKeys.forEach(k => {
                            const val = row[k];
                            if (val === null || val === undefined || val.toString().trim() === '') isRowIncomplete = true;
                        });
                        if (isRowIncomplete) incompleteRows++;
                    });
                    const completeRows = total - incompleteRows;
                    return { total, complete: completeRows, incomplete: incompleteRows, percentComplete: total === 0 ? 0 : Math.round((completeRows / total) * 100), isGlobal: false };
                }
            }, [summaryData, tableData, tableFilter]);

            const processedRows = useMemo(() => {
                let dynamicCols = [];
                const rows = tableData.map(row => {
                    const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()));
                    if (dynamicCols.length === 0) dynamicCols = editableKeys.slice(0, 5);
                    let filledCount = 0;
                    let missingFieldsCount = 0;
                    editableKeys.forEach(k => {
                        const val = row[k];
                        if (val !== null && val !== undefined && val.toString().trim() !== '') filledCount++;
                        else missingFieldsCount++;
                    });
                    const numCampos = editableKeys.length;
                    const percent = numCampos === 0 ? 100 : Math.round((filledCount / numCampos) * 100);
                    const nombreValor = row.nombre || row.name || row.titulo || row.title || `Reg #${row.id || '-'}`;
                    return { ...row, _meta: { nombreValor, numCampos, missingFieldsCount, percent, editableKeys, isComplete: missingFieldsCount === 0 } };
                });
                return { rows, dynamicCols };
            }, [tableData]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const filteredAndSortedRows = useMemo(() => {
                let result = processedRows.rows.filter(row => {
                    const matchesSearch = row._meta.nombreValor.toLowerCase().includes(tableSearch.toLowerCase());
                    const matchesIncomplete = showOnlyIncomplete ? !row._meta.isComplete : true;
                    return matchesSearch && matchesIncomplete;
                });
                if (sortConfig.key) {
                    result.sort((a, b) => {
                        let aVal = a._meta[sortConfig.key] !== undefined ? a._meta[sortConfig.key] : a[sortConfig.key];
                        let bVal = b._meta[sortConfig.key] !== undefined ? b._meta[sortConfig.key] : b[sortConfig.key];
                        if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                        if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                        if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [processedRows.rows, tableSearch, showOnlyIncomplete, sortConfig]);

            const exportTableToExcel = () => {
                if (!tableFilter || filteredAndSortedRows.length === 0) return;
                const wb = XLSX.utils.book_new();
                const wsData = filteredAndSortedRows.map(r => {
                    const out = { "ESTADO": r._meta.isComplete ? "OK" : "Revisar", "PROGRESO": r._meta.percent + "%", "NOMBRE": r._meta.nombreValor };
                    r._meta.editableKeys.forEach(c => { out[c.toUpperCase()] = r[c] || ""; });
                    return out;
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wsData), "Datos");
                XLSX.writeFile(wb, `Auditoria_${tableFilter}.xlsx`);
            };

            const exportFormToExcel = () => {
                if (!selectedRecord) return;
                const wb = XLSX.utils.book_new();
                const data = [["CAMPO", "VALOR ACTUAL", "NUEVO VALOR"]];
                selectedRecord._meta.editableKeys.forEach(k => { data.push([k.toUpperCase(), selectedRecord[k] || "", ""]); });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "Formulario");
                XLSX.writeFile(wb, `Edicion_${selectedRecord._meta.nombreValor}.xlsx`);
            };

            useEffect(() => {
                if (currentView !== 'dashboard' || !dashboardStats) return;
                const ctx = donutChartRef.current;
                if (ctx) {
                    if (donutChartInstance.current) donutChartInstance.current.destroy();
                    donutChartInstance.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Completos', 'Incompletos'],
                            datasets: [{
                                data: [dashboardStats.complete, dashboardStats.incomplete],
                                backgroundColor: [isDark ? '#34d399' : '#059669', isDark ? '#f87171' : '#dc2626'],
                                borderWidth: 0, cutout: '75%'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [dashboardStats, isDark, currentView]);

            const sortedSummary = useMemo(() => {
                return [...summaryData]
                    .map(cat => ({ ...cat, percent: cat.total === 0 ? 0 : Math.round((cat.complete / cat.total) * 100) }))
                    .sort((a, b) => b.percent - a.percent);
            }, [summaryData]);

            const renderSortIcon = (key) => {
                if (sortConfig.key !== key) return <i className="ph ph-caret-up-down ml-1 opacity-30"></i>;
                return sortConfig.direction === 'asc' ? <i className="ph-bold ph-caret-up ml-1 text-primary"></i> : <i className="ph-bold ph-caret-down ml-1 text-primary"></i>;
            };

            return (
                <div className="flex flex-col h-screen">
                    {/* --- HEADER --- */}
                    <header className="h-16 bg-navy-dark border-b-[4px] border-primary flex items-center justify-between px-6 z-30 shrink-0 shadow-md">
                        <div className="flex items-center space-x-6">
                            <div className="flex items-center space-x-3">
                                <img src={BADAJOZ_LOGO_PATH} alt="Badajoz" className="h-8 object-contain" />
                                <img src={LOGO_PATH} alt="Timestamp" className="h-8 object-contain" />
                            </div>
                            <div className="h-8 w-px bg-gray-700 hidden sm:block"></div>
                            <span className="text-lg font-bold text-white font-serif tracking-wide hidden sm:block">Consultor de datos turísticos Badajoz</span>
                        </div>
                        <div className="flex items-center space-x-4">
                            <div className="flex items-center space-x-2 bg-gray-800 px-4 py-1.5 rounded-full border border-gray-700 text-sm text-gray-300">
                                <i className="ph ph-user text-lg"></i>
                                <span className="font-medium">{userEmail ? userEmail.split('@')[0] : 'Admin'}</span>
                                <button onClick={onLogout} className="ml-2 hover:text-white transition-colors"><i className="ph ph-sign-out text-lg"></i></button>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* --- SIDEBAR --- */}
                        <aside className="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-20 shrink-0">
                            <nav className="flex-1 p-4 space-y-1 mt-4">
                                <button onClick={() => setCurrentView('dashboard')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all ${currentView === 'dashboard' ? 'text-primary bg-primary-50 dark:bg-primary-900/20' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50'}`}>
                                    <i className="ph ph-house text-xl mr-3"></i> Home
                                </button>
                                <button onClick={() => setCurrentView('data')} className={`w-full flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all ${currentView === 'data' ? 'text-primary bg-primary-50 dark:bg-primary-900/20' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50'}`}>
                                    <i className="ph ph-database text-xl mr-3"></i> Gestión de Datos
                                </button>
                            </nav>
                            <div className="p-6 border-t border-gray-100 dark:border-gray-700">
                                <div className="flex items-center justify-between">
                                    <span className="text-xs text-gray-400 font-bold uppercase tracking-widest">Modo Oscuro</span>
                                    <button onClick={() => setIsDark(!isDark)} className="p-2 rounded-lg text-gray-400 hover:text-primary transition-all">
                                        {isDark ? <i className="ph-fill ph-moon text-xl"></i> : <i className="ph ph-sun text-xl"></i>}
                                    </button>
                                </div>
                            </div>
                        </aside>

                        {/* --- CONTENIDO --- */}
                        <main className="flex-1 overflow-y-auto p-8 bg-gray-100/50 dark:bg-gray-900 transition-colors">
                            {/* Selector de Contexto Global */}
                            <div className="max-w-6xl mx-auto mb-8 bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-gray-200/60 dark:border-gray-700 flex flex-col sm:flex-row items-center justify-between gap-4 fade-in">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-primary/10 rounded-lg text-primary"><i className="ph-fill ph-funnel text-xl"></i></div>
                                    <div>
                                        <h4 className="text-sm font-bold text-gray-900 dark:text-white">Contexto de Datos</h4>
                                        <p className="text-[10px] text-gray-500 uppercase tracking-tighter">Filtrar tabla de AWS</p>
                                    </div>
                                </div>
                                <select className="w-full sm:w-80 py-2.5 px-4 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm font-semibold focus:ring-2 focus:ring-primary outline-none transition-all cursor-pointer"
                                    value={tableFilter} onChange={(e) => { setTableFilter(e.target.value); if (e.target.value && currentView === 'dashboard') setCurrentView('data'); }}>
                                    <option value="">Vista Global de AWS...</option>
                                    {Object.entries(CATEGORY_TRANSLATIONS).sort((a,b)=>a[1].localeCompare(b[1])).map(([key, val]) => (
                                        <option key={key} value={key}>{val}</option>
                                    ))}
                                </select>
                            </div>

                            {currentView === 'dashboard' && dashboardStats && (
                                <div className="max-w-6xl mx-auto space-y-8 fade-in">
                                    <div className="bg-white dark:bg-gray-800 p-10 rounded-[2rem] shadow-sm border border-gray-200/60 dark:border-gray-700">
                                        <h2 className="text-3xl font-black mb-4 tracking-tight">Panel de Auditoría</h2>
                                        <p className="text-gray-500 dark:text-gray-400 max-w-3xl leading-relaxed">Bienvenido a la herramienta de enriquecimiento de datos de <strong>Badajoz</strong>. Monitoriza la salud de la base de datos, localiza vacíos y optimiza la calidad de tu información.</p>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 p-10 rounded-[2rem] shadow-sm border border-gray-200/60 flex flex-col lg:flex-row items-center gap-16 transition-all hover:shadow-md">
                                        <div className="w-full lg:w-1/3 flex flex-col items-center">
                                            <div className="relative h-56 w-56">
                                                <canvas ref={donutChartRef}></canvas>
                                                <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                                                    <span className="text-4xl font-black">{dashboardStats.percentComplete}%</span>
                                                    <span className="text-[10px] uppercase tracking-widest text-gray-400 font-bold mt-1">Calidad</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex-1 w-full grid grid-cols-1 sm:grid-cols-3 gap-8">
                                            <div className="p-6 rounded-3xl bg-gray-50 dark:bg-gray-900/30 border border-gray-100 dark:border-gray-700/50">
                                                <i className="ph-fill ph-shield-check text-primary text-3xl mb-3"></i>
                                                <div className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Índice Calidad</div>
                                                <div className="text-3xl font-black">{dashboardStats.percentComplete}%</div>
                                            </div>
                                            <div className="p-6 rounded-3xl bg-gray-50 dark:bg-gray-900/30 border border-gray-100 dark:border-gray-700/50 text-primary">
                                                <i className="ph-fill ph-warning-circle text-3xl mb-3"></i>
                                                <div className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Incompletos</div>
                                                <div className="text-3xl font-black">{dashboardStats.incomplete.toLocaleString()}</div>
                                            </div>
                                            <div className="p-6 rounded-3xl bg-gray-50 dark:bg-gray-900/30 border border-gray-100 dark:border-gray-700/50">
                                                <i className="ph-fill ph-database text-blue-500 text-3xl mb-3"></i>
                                                <div className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Total AWS</div>
                                                <div className="text-3xl font-black">{dashboardStats.total.toLocaleString()}</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 p-10 rounded-[2rem] shadow-sm border border-gray-200/60 dark:border-gray-700">
                                        <h4 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-8 flex items-center">
                                            <i className="ph-fill ph-circles-four mr-3 text-primary text-xl"></i> Estado por Categorías
                                        </h4>
                                        <div className="flex flex-wrap gap-4">
                                            {sortedSummary.map(cat => (
                                                <button key={cat.name} onClick={() => { setTableFilter(cat.name); setCurrentView('data'); }}
                                                    className="pill-transition flex items-center px-5 py-3 rounded-2xl border border-opacity-10 hover:shadow-lg transition-all group"
                                                    style={{ backgroundColor: getPastelColor(cat.percent, isDark), borderColor: isDark ? getSolidColor(cat.percent, isDark) : 'transparent' }}>
                                                    <span className="text-sm font-semibold text-gray-700 dark:text-gray-300 mr-4 group-hover:text-primary transition-colors">
                                                        {CATEGORY_TRANSLATIONS[cat.name] || cat.name}
                                                    </span>
                                                    <span className="text-[11px] font-black px-3 py-1 rounded-xl text-white shadow-sm" style={{ backgroundColor: getSolidColor(cat.percent, isDark) }}>{cat.percent}%</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {currentView === 'data' && tableFilter && (
                                <div className="max-w-full mx-auto h-full flex flex-col fade-in space-y-6">
                                    <div className="flex flex-col md:flex-row items-center justify-between bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-200/60 shadow-sm gap-6">
                                        <div className="flex items-center gap-6 w-full md:w-auto">
                                            <div className="relative w-full md:w-96">
                                                <i className="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                                                <input type="text" placeholder="Buscar registros..." value={tableSearch} onChange={e => setTableSearch(e.target.value)} className="w-full pl-12 pr-4 py-3 border border-gray-100 dark:border-gray-600 rounded-xl text-sm bg-gray-50 dark:bg-gray-900 outline-none focus:ring-2 focus:ring-primary/50 font-medium" />
                                            </div>
                                            <label className="flex items-center gap-3 text-xs font-bold uppercase tracking-tighter text-gray-500 cursor-pointer hover:text-primary transition-colors">
                                                <input type="checkbox" checked={showOnlyIncomplete} onChange={e => setShowOnlyIncomplete(e.target.checked)} className="rounded text-primary focus:ring-primary w-5 h-5 border-gray-200" />
                                                <span>Incompletos</span>
                                            </label>
                                        </div>
                                        <button onClick={exportTableToExcel} className="w-full md:w-auto flex items-center justify-center px-6 py-3 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-xl transition-all shadow-sm active:scale-95">
                                            <i className="ph-bold ph-microsoft-excel-logo mr-3 text-lg"></i> Exportar Auditoría
                                        </button>
                                    </div>

                                    <div className="bg-white dark:bg-gray-800 border border-gray-200/60 dark:border-gray-700 rounded-2xl overflow-hidden shadow-sm flex-1">
                                        <div className="overflow-x-auto h-full">
                                            <table className="w-full text-left text-sm border-collapse whitespace-nowrap">
                                                <thead className="bg-gray-50 dark:bg-gray-900/50 text-gray-400 font-bold uppercase text-[10px] tracking-widest sticky top-0 z-10">
                                                    <tr>
                                                        <th className="p-6 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => handleSort('isComplete')}>Estado {renderSortIcon('isComplete')}</th>
                                                        <th className="p-6 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => handleSort('nombreValor')}>Recurso {renderSortIcon('nombreValor')}</th>
                                                        <th className="p-6 text-center cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => handleSort('missingFieldsCount')}>Faltantes {renderSortIcon('missingFieldsCount')}</th>
                                                        {processedRows.dynamicCols.map(col => (
                                                            <th key={col} className="p-6 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => handleSort(col)}>
                                                                {col.replace(/_/g, ' ')} {renderSortIcon(col)}
                                                            </th>
                                                        ))}
                                                        <th className="p-6 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800" onClick={() => handleSort('percent')}>Progreso {renderSortIcon('percent')}</th>
                                                        <th className="p-6 text-center">Acciones</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100 dark:divide-gray-700/50">
                                                    {filteredAndSortedRows.map(row => (
                                                        <tr key={row.id} className="hover:bg-gray-50/50 dark:hover:bg-gray-700/20 transition-colors">
                                                            <td className="p-6">
                                                                <span className={`inline-flex items-center px-3 py-1 rounded-lg text-[10px] font-black ${row._meta.isComplete ? 'bg-green-100/50 text-green-700 dark:bg-green-900/30' : 'bg-red-100/50 text-primary dark:bg-red-900/30'}`}>
                                                                    {row._meta.isComplete ? 'ÓPTIMO' : 'REVISAR'}
                                                                </span>
                                                            </td>
                                                            <td className="p-6 font-bold text-gray-900 dark:text-gray-100">{row._meta.nombreValor}</td>
                                                            <td className="p-6 text-center">
                                                                <span className={`font-bold px-2.5 py-1 rounded-full text-xs ${row._meta.missingFieldsCount > 0 ? 'bg-red-50 text-red-600 dark:bg-red-900/20' : 'bg-gray-100 text-gray-400'}`}>
                                                                    {row._meta.missingFieldsCount}
                                                                </span>
                                                            </td>
                                                            {processedRows.dynamicCols.map(col => (
                                                                <td key={col} className="p-6 text-gray-500 dark:text-gray-400 truncate max-w-[200px]">{row[col] || '---'}</td>
                                                            ))}
                                                            <td className="p-6 min-w-[150px]">
                                                                <div className="flex items-center gap-3">
                                                                    <div className="flex-1 h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden shadow-inner">
                                                                        <div className="h-full" style={{ width: `${row._meta.percent}%`, backgroundColor: getSolidColor(row._meta.percent, isDark) }}></div>
                                                                    </div>
                                                                    <span className="text-[11px] font-black w-10 text-right" style={{ color: getSolidColor(row._meta.percent, isDark) }}>{row._meta.percent}%</span>
                                                                </div>
                                                            </td>
                                                            <td className="p-6 text-center">
                                                                <button onClick={() => setSelectedRecord(row)} className="p-3 bg-gray-100 dark:bg-gray-700 rounded-xl hover:text-primary transition-all"><i className="ph-bold ph-eye text-xl"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* --- MODAL DETALLE (AMPLIADO A 4/6) --- */}
                    {selectedRecord && (
                        <div className="fixed inset-0 bg-navy-dark/90 backdrop-blur-md z-50 flex items-center justify-center p-6 fade-in">
                            <div className="bg-white dark:bg-gray-800 rounded-[2.5rem] w-full max-w-[66%] max-h-[90vh] overflow-hidden flex flex-col shadow-2xl border border-white/10 slide-up">
                                <div className="p-8 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-900/20">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary"><i className="ph-fill ph-database text-2xl"></i></div>
                                        <div>
                                            <h3 className="font-black text-2xl tracking-tight text-gray-900 dark:text-white">{selectedRecord._meta.nombreValor}</h3>
                                            <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-0.5">ID AWS: {selectedRecord.id || 'N/A'}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedRecord(null)} className="p-3 bg-gray-100 dark:bg-gray-700 rounded-2xl hover:text-primary transition-all"><i className="ph-bold ph-x text-xl"></i></button>
                                </div>
                                <div className="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 bg-white dark:bg-gray-800 custom-scrollbar">
                                    {selectedRecord._meta.editableKeys.map(key => {
                                        const val = selectedRecord[key];
                                        const isLongText = (val && val.length > 100) || key.toLowerCase().includes('desc') || key.toLowerCase().includes('text') || key.toLowerCase().includes('body');
                                        return (
                                            <div key={key} className={`${isLongText ? 'md:col-span-2 lg:col-span-3' : ''} space-y-2`}>
                                                <label className="text-[10px] font-black uppercase text-gray-400 tracking-widest ml-1">{key.replace(/_/g, ' ')}</label>
                                                {isLongText ? (
                                                    <div className="p-5 bg-gray-50 dark:bg-gray-900/50 rounded-2xl text-sm border border-gray-100 dark:border-gray-700/50 font-medium leading-relaxed max-h-40 overflow-y-auto custom-scrollbar italic text-gray-600 dark:text-gray-300">
                                                        {val || 'Sin contenido detallado en AWS.'}
                                                    </div>
                                                ) : (
                                                    <div className="p-4 bg-gray-50 dark:bg-gray-900/50 rounded-2xl text-sm border border-gray-100 dark:border-gray-700/50 font-bold truncate">
                                                        {val || <span className="font-normal italic text-gray-400">Campo vacío</span>}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="p-8 bg-gray-50 dark:bg-gray-900/50 border-t border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-3">
                                        <div className="h-2 w-32 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                                            <div className="h-full" style={{ width: `${selectedRecord._meta.percent}%`, backgroundColor: getSolidColor(selectedRecord._meta.percent, isDark) }}></div>
                                        </div>
                                        <span className="text-xs font-black" style={{ color: getSolidColor(selectedRecord._meta.percent, isDark) }}>{selectedRecord._meta.percent}% completado</span>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setSelectedRecord(null)} className="px-8 py-3.5 text-sm font-bold text-gray-500 hover:text-gray-900 transition-colors">Cerrar Visor</button>
                                        <button onClick={exportFormToExcel} className="px-8 py-3.5 bg-green-600 hover:bg-green-700 text-white rounded-2xl text-sm font-bold flex items-center justify-center shadow-lg shadow-green-600/20 active:scale-95 transition-all">
                                            <i className="ph-bold ph-microsoft-excel-logo mr-3 text-xl"></i> Exportar Plantilla de Edición
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [token, setToken] = useState('');

            useEffect(() => { document.documentElement.classList.add('dark'); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    const res = await fetch('http://localhost:3000/api/auth/login', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) { setToken(data.token); setIsAuthenticated(true); }
                    else { setError(data.message || 'Credenciales incorrectas'); }
                } catch (err) { setError('Fallo de conexión al servidor local.'); }
            };

            if (!isAuthenticated) {
                return (
                    <div className="h-full flex items-center justify-center bg-gray-900 p-6 relative overflow-hidden">
                        <div className="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] bg-primary rounded-full blur-[150px] opacity-10"></div>
                        <div className="bg-white dark:bg-gray-800 p-12 rounded-[3rem] shadow-2xl w-full max-w-md relative z-10 fade-in border border-white/5">
                            <div className="text-center mb-10">
                                <img src={LOGO_PATH} alt="Timestamp" className="h-12 mx-auto mb-8" />
                                <h2 className="text-3xl font-black tracking-tight text-gray-900 dark:text-white">Acceso Auditoría</h2>
                                <p className="text-gray-400 mt-3 font-semibold text-sm uppercase tracking-widest">Data Quality Dashboard</p>
                            </div>
                            {error && <div className="bg-red-500/10 text-primary p-5 rounded-2xl text-xs font-bold mb-8 flex items-center gap-3 border border-primary/20"><i className="ph-fill ph-warning-circle text-xl"></i> {error}</div>}
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-gray-400 ml-2">Usuario</label>
                                    <input type="text" required value={email} onChange={e => setEmail(e.target.value)} placeholder="admin" className="w-full px-6 py-4 bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-primary/20 transition-all font-semibold" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black uppercase text-gray-400 ml-2">Contraseña</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" className="w-full px-6 py-4 bg-gray-50 dark:bg-gray-900 border border-gray-100 dark:border-gray-700 rounded-2xl outline-none focus:ring-4 focus:ring-primary/20 transition-all font-semibold" />
                                </div>
                                <button type="submit" className="w-full bg-primary hover:bg-primary-600 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-2xl shadow-primary/30 transition-all active:scale-95 mt-4">Entrar al Panel</button>
                            </form>
                        </div>
                    </div>
                );
            }
            return <Dashboard userEmail={email} token={token} onLogout={() => setIsAuthenticated(false)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
