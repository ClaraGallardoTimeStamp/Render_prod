<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timestamp Consulting | Data Quality Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#EB1C23',
                            50: '#fdf3f3', 100: '#fce4e5', 200: '#f8c2c4',
                            300: '#f39aa0', 400: '#eb4f58', 500: '#EB1C23',
                            600: '#d4151a', 700: '#b10f14', 800: '#921014', 900: '#791215',
                        },
                        navy: { dark: '#2a3241' },
                        warm: { 50: '#fcf6f6', 100: '#faecec', 200: '#f5dada' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); } }
        @keyframes toastProgress { from { width: 100%; } to { width: 0%; } }
        .animate-toast-progress { animation: toastProgress 5s linear forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        .pill-transition { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .resizer { position: absolute; right: 0; top: 0; height: 100%; width: 4px; background: rgba(0, 0, 0, 0.05); cursor: col-resize; user-select: none; touch-action: none; transition: background 0.2s; }
        .dark .resizer { background: rgba(255, 255, 255, 0.05); }
        .resizer:hover, .resizer.is-resizing { background: #EB1C23; width: 4px; }
    </style>
</head>

<body class="bg-warm-50 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-200 overflow-hidden flex flex-col h-screen">

    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        // ==========================================
        // 🌐 CONFIGURACIÓN DE RUTAS DE LA API
        // ==========================================
        // Usamos esta variable para decirle al Frontend dónde está el Backend.
        // - Si está vacío (''), significa que el Frontend y el Backend están en el mismo servidor (como en Render).
        // - Si le pones una URL, obligas al Frontend a buscar los datos en esa dirección.

        // ✅ PRODUCCIÓN — URLs relativas (Render)
        // Deja esta descomentada cuando subas tu código a internet.
        //const API_BASE = '';

        // 🛑 LOCAL — descomenta para desarrollo
        // Usa esta cuando estés programando en tu ordenador y tengas el servidor Node abierto en otra pestaña.
        const API_BASE = 'http://localhost:3000';

        const { useState, useMemo, useEffect, useRef } = React;

        const LOGO_PATH = "./assets/logo-red.svg";
        const BADAJOZ_LOGO_PATH = "./assets/badajoz.svg";

        const EXCLUDED_FIELDS = [
            'id', 'palabras_clave', 'uri_clase', 'estado_publicacion', 'url_web', 'app', 'accessibility_level',
            'accessibility_description', 'uri_segittur', 'fecha_creacion', 'fecha_actualizacion', 'drupal_nid',
            'nivel_1', 'nivel_2', 'nivel_3', 'nivel_4', 'nivel_5', 'auditoria_estado', 'usuario_auditor'
        ].map(f => f.toLowerCase());

        const CATEGORY_TRANSLATIONS = {
            "accessible_poi": "Punto de Interés Accesible", "alojamientos": "Alojamientos", "archeological_site": "Sitio Arqueológico",
            "atm": "Cajero Automático", "audio_guide": "Audioguía", "beach": "Playa", "bike_lane": "Carril Bici",
            "bridge": "Puente", "castle": "Castillo", "church": "Iglesia", "complementary_activities_company": "Actividades Complementarias",
            "destination_experience": "Experiencia en Destino", "educational_centre": "Centro Educativo", "equestrian_club": "Club Hípico",
            "event": "Evento", "fire_station": "Estación de Bomberos", "garden": "Jardín", "gas_station": "Gasolinera",
            "historical_or_cultural_resource": "Recurso Histórico o Cultural", "image_360": "Imagen 360", "leisure_and_culture_facility": "Instalación de Ocio y Cultura",
            "medical_service": "Servicio Médico", "miscellaneous_service": "Servicios Misceláneos", "monument": "Monumento",
            "municipio_ref": "Referencia de Municipio", "museum": "Museo", "natural_park": "Parque Natural", "natural_view_point": "Mirador Natural",
            "offer": "Oferta", "pamphlet": "Folleto", "pharmacy": "Farmacia", "photography": "Fotografía", "police_station": "Comisaría de Policía",
            "primary_care": "Atención Primaria", "restaurantes": "Restaurantes", "route": "Ruta", "shopping_mall": "Centro Comercial",
            "sport_facility": "Instalación Deportiva", "supermarket": "Supermercado", "tour_guide": "Guía Turístico",
            "tourism_destination": "Destino Turístico", "tourist_attraction_site": "Atracción Turística", "tourist_information_office": "Oficina de Turismo",
            "town_hall": "Ayuntamiento", "traditional_market": "Mercado Tradicional", "trail": "Sendero", "travel_agency": "Agencia de Viajes",
            "trivia_question": "Pregunta de Trivial", "vehicle_experience": "Experiencia en Vehículo", "vehicle_workshop": "Taller de Vehículos",
            "vernacular_architecture": "Arquitectura Vernácula", "video_360": "Video 360", "video_media": "Medio de Video",
            "virtual_visit": "Visita Virtual", "wifi_point": "Punto WiFi", "winery": "Bodega"
        };

        const FIELD_TRANSLATIONS = {
            "nombre": "Nombre", "name": "Nombre", "title": "Título", "titulo": "Título",
            "direccion": "Dirección", "address": "Dirección", "municipio": "Municipio",
            "telefono": "Teléfono", "phone": "Teléfono", "email": "Correo Electrónico",
            "long_description": "Descripción Larga", "short_description": "Descripción Corta",
            "description": "Descripción", "descripción": "Descripción",
            "latitud": "Latitud", "latitude": "Latitud", "longitud": "Longitud", "longitude": "Longitud",
            "url_web": "Sitio Web", "web": "Sitio Web", "facebook": "Facebook", "twitter": "Twitter",
            "instagram": "Instagram", "fecha_actualizacion": "Última Actualización",
            "horario": "Horario de Apertura", "precio": "Precio/Tarifa"
        };

        const translateField = (key) => FIELD_TRANSLATIONS[key.toLowerCase()] || key.replace(/_/g, ' ').toUpperCase();

        const getSolidColor = (percent, isDark) => {
            if (percent <= 30) return isDark ? '#f87171' : '#dc2626';
            if (percent >= 100) return isDark ? '#34d399' : '#059669';
            const hue = ((percent - 30) / 70) * 120;
            return `hsl(${hue}, ${isDark ? '40%' : '50%'}, ${isDark ? '55%' : '45%'})`;
        };

        const getPastelColor = (percent, isDark) => {
            if (percent <= 30) return isDark ? 'rgba(248, 113, 113, 0.08)' : 'rgba(220, 38, 38, 0.04)';
            if (percent >= 100) return isDark ? 'rgba(52, 211, 153, 0.08)' : 'rgba(5, 150, 105, 0.04)';
            const hue = ((percent - 30) / 70) * 120;
            return `hsla(${hue}, ${isDark ? '35%' : '40%'}, 50%, ${isDark ? '0.12' : '0.06'})`;
        };

        function Dashboard({ userEmail, token, onLogout }) {
            const [isDark, setIsDark] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard');
            
            // FILTROS PRINCIPALES
            const [tableFilter, setTableFilter] = useState('');
            const [locationFilter, setLocationFilter] = useState(''); 
            
            const [selectedRecord, setSelectedRecord] = useState(null);
            const [summaryData, setSummaryData] = useState([]);
            
            // NUEVO: Array maestro con TODOS los datos para permitir cruces inmediatos
            const [allData, setAllData] = useState([]);
            const [isLoadingData, setIsLoadingData] = useState(false);

            const [tableSearch, setTableSearch] = useState('');
            const [showOnlyIncomplete, setShowOnlyIncomplete] = useState(false);
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const [toast, setToast] = useState(null);
            const [nameWidth, setNameWidth] = useState(240);
            const isResizing = useRef(false);

            const donutChartRef = useRef(null);
            const donutChartInstance = useRef(null);

            useEffect(() => {
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            // 1. Cargar Estadísticas / Resumen de Categorías
            // 👉 Usamos API_BASE aquí para apuntar al servidor correcto
            useEffect(() => {
                fetch(`${API_BASE}/api/estadisticas`, { headers: { 'Authorization': `Bearer ${token}` } })
                    .then(res => res.json())
                    .then(data => { if (Array.isArray(data)) setSummaryData(data); })
                    .catch(err => console.error("Error estadísticas:", err));
            }, [token]);

            // 2. Cargar TODOS los datos en segundo plano para permitir cruces Localidad <-> Categoría
            // 👉 Y aquí también usamos API_BASE
            useEffect(() => {
                if (summaryData.length === 0 || !token) return;
                setIsLoadingData(true);
                
                Promise.all(summaryData.map(cat =>
                    fetch(`${API_BASE}/api/datos/${cat.name}`, { headers: { 'Authorization': `Bearer ${token}` } })
                        .then(res => res.ok ? res.json() : [])
                        .then(data => Array.isArray(data) ? data.map(item => ({...item, _categoria: cat.name})) : [])
                        .catch(() => [])
                )).then(results => {
                    setAllData(results.flat());
                    setIsLoadingData(false);
                });
            }, [summaryData, token]);

            // EXTRAER LOCALIDADES DISPONIBLES (De todos los datos cargados)
            const availableLocations = useMemo(() => {
                const locs = new Set();
                allData.forEach(row => {
                    const loc = row.municipio || row.municipality || row.city || row.ciudad;
                    if (loc && typeof loc === 'string' && loc.trim() !== '') {
                        locs.add(loc.trim());
                    }
                });
                return Array.from(locs).sort();
            }, [allData]);

            // EXTRAER CATEGORÍAS DISPONIBLES (Basado en la localidad seleccionada)
            const availableCategories = useMemo(() => {
                if (!locationFilter) {
                    return summaryData.map(c => c.name).sort();
                }
                const cats = new Set();
                allData.forEach(row => {
                    const rowLoc = row.municipio || row.municipality || row.city || row.ciudad;
                    if (rowLoc === locationFilter && row._categoria) {
                        cats.add(row._categoria);
                    }
                });
                return Array.from(cats).sort();
            }, [allData, summaryData, locationFilter]);

            // APLICAR FILTROS GLOBALES
            const filteredAllData = useMemo(() => {
                return allData.filter(row => {
                    const rowLoc = row.municipio || row.municipality || row.city || row.ciudad;
                    const matchesLoc = locationFilter ? rowLoc === locationFilter : true;
                    const matchesCat = tableFilter ? row._categoria === tableFilter : true;
                    return matchesLoc && matchesCat;
                });
            }, [allData, locationFilter, tableFilter]);

            // ESTADÍSTICAS DEL DASHBOARD
            const dashboardStats = useMemo(() => {
                if (filteredAllData.length === 0) return null;
                
                let total = filteredAllData.length;
                let completeRows = 0;
                let enRevisionRows = 0;
                let incompleteRows = 0;

                filteredAllData.forEach(row => {
                    const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()) && k !== '_categoria');
                    let isRowIncomplete = false;
                    editableKeys.forEach(k => {
                        const val = row[k];
                        if (val === null || val === undefined || val.toString().trim() === '') isRowIncomplete = true;
                    });

                    if (!isRowIncomplete) {
                        completeRows++;
                    } else if (row.auditoria_estado === 'En revisión') {
                        enRevisionRows++;
                    } else {
                        incompleteRows++;
                    }
                });
                return { total, complete: completeRows, enRevision: enRevisionRows, incomplete: incompleteRows, percentComplete: total === 0 ? 0 : Math.round((completeRows / total) * 100) };
            }, [filteredAllData]);

            const processedRows = useMemo(() => {
                return filteredAllData.map(row => {
                    const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()) && k !== '_categoria');
                    let filledCount = 0;
                    let missingFieldsCount = 0;
                    editableKeys.forEach(k => {
                        const val = row[k];
                        if (val !== null && val !== undefined && val.toString().trim() !== '') filledCount++;
                        else missingFieldsCount++;
                    });
                    const numCampos = editableKeys.length;
                    const percent = numCampos === 0 ? 100 : parseFloat(((filledCount / numCampos) * 100).toFixed(2));
                    const nombreValor = row.nombre || row.name || row.titulo || row.title || `Reg #${row.id || '-'}`;

                    let fechaMod = "---";
                    if (row.fecha_actualizacion) {
                        fechaMod = new Date(row.fecha_actualizacion).toLocaleDateString('es-ES');
                    } else if (row.fecha_creacion) {
                        fechaMod = new Date(row.fecha_creacion).toLocaleDateString('es-ES');
                    }

                    return { ...row, _meta: { nombreValor, numCampos, missingFieldsCount, percent, editableKeys, fechaMod, isComplete: missingFieldsCount === 0 } };
                });
            }, [filteredAllData]);

            const handleSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const filteredAndSortedRows = useMemo(() => {
                let result = processedRows.filter(row => {
                    const matchesSearch = row._meta.nombreValor.toLowerCase().includes(tableSearch.toLowerCase());
                    const matchesIncomplete = showOnlyIncomplete ? !row._meta.isComplete : true;
                    return matchesSearch && matchesIncomplete;
                });
                
                if (sortConfig.key) {
                    result.sort((a, b) => {
                        let aVal = a._meta[sortConfig.key] !== undefined ? a._meta[sortConfig.key] : a[sortConfig.key];
                        let bVal = b._meta[sortConfig.key] !== undefined ? b._meta[sortConfig.key] : b[sortConfig.key];
                        if (typeof aVal === 'string') aVal = aVal.toLowerCase();
                        if (typeof bVal === 'string') bVal = bVal.toLowerCase();
                        if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [processedRows, tableSearch, showOnlyIncomplete, sortConfig]);

            const startResizing = (e) => {
                isResizing.current = true;
                const startX = e.pageX;
                const startWidth = nameWidth;
                const onMouseMove = (moveEvent) => {
                    if (!isResizing.current) return;
                    const newWidth = startWidth + (moveEvent.pageX - startX);
                    if (newWidth > 100) setNameWidth(newWidth);
                };
                const onMouseUp = () => {
                    isResizing.current = false;
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };

            const autoResize = () => {
                const names = filteredAndSortedRows.map(r => r._meta.nombreValor);
                if (names.length === 0) return;
                const longestName = names.reduce((a, b) => a.length > b.length ? a : b);
                const estimatedWidth = (longestName.length * 8.5) + 32;
                setNameWidth(Math.max(150, Math.min(estimatedWidth, 600)));
            };

            useEffect(() => {
                if (currentView !== 'dashboard' || !dashboardStats) return;
                const ctx = donutChartRef.current;
                if (ctx) {
                    if (donutChartInstance.current) donutChartInstance.current.destroy();
                    donutChartInstance.current = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Completos', 'En Revisión', 'Incompletos'],
                            datasets: [{
                                data: [dashboardStats.complete, dashboardStats.enRevision, dashboardStats.incomplete],
                                backgroundColor: [
                                    isDark ? '#34d399' : '#059669',
                                    isDark ? '#fbbf24' : '#d97706',
                                    isDark ? '#f87171' : '#dc2626'
                                ],
                                borderWidth: 0, cutout: '80%'
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    });
                }
            }, [dashboardStats, isDark, currentView]);

            const sortedSummary = useMemo(() => {
                if (!locationFilter) {
                    return [...summaryData]
                        .map(cat => ({ ...cat, percent: cat.total === 0 ? 0 : parseFloat(((cat.complete / cat.total) * 100).toFixed(2)) }))
                        .sort((a, b) => b.percent - a.percent);
                } else {
                    const catStats = {};
                    filteredAllData.forEach(row => {
                        const cat = row._categoria;
                        if (!catStats[cat]) catStats[cat] = { name: cat, total: 0, complete: 0 };
                        catStats[cat].total++;

                        const editableKeys = Object.keys(row).filter(k => !EXCLUDED_FIELDS.includes(k.toLowerCase()) && k !== '_categoria');
                        let isRowIncomplete = false;
                        editableKeys.forEach(k => {
                            const val = row[k];
                            if (val === null || val === undefined || val.toString().trim() === '') isRowIncomplete = true;
                        });
                        if (!isRowIncomplete) catStats[cat].complete++;
                    });

                    return Object.values(catStats)
                        .map(cat => ({ ...cat, percent: cat.total === 0 ? 0 : parseFloat(((cat.complete / cat.total) * 100).toFixed(2)) }))
                        .sort((a, b) => b.percent - a.percent);
                }
            }, [summaryData, filteredAllData, locationFilter]);

            const exportTableToExcel = () => {
                if (filteredAndSortedRows.length === 0) return;
                const wb = XLSX.utils.book_new();
                const wsData = filteredAndSortedRows.map(r => {
                    const out = { 
                        "CATEGORÍA": CATEGORY_TRANSLATIONS[r._categoria] || r._categoria,
                        "ESTADO": r._meta.isComplete ? "OK" : "Revisar", 
                        "PROGRESO": r._meta.percent + "%", 
                        "NOMBRE": r._meta.nombreValor, 
                        "ULTIMA_MOD": r._meta.fechaMod 
                    };
                    r._meta.editableKeys.forEach(c => { out[c.toUpperCase()] = r[c] || ""; });
                    return out;
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wsData), "Auditoría");
                let fileName = `Reporte_Calidad`;
                if(locationFilter) fileName += `_${locationFilter}`;
                if(tableFilter) fileName += `_${tableFilter}`;
                XLSX.writeFile(wb, `${fileName}.xlsx`);
            };

            const exportFormToExcel = async () => {
                if (!selectedRecord) return;
                try {
                    // 👉 Asegurarnos de apuntar a API_BASE para no tener problemas de CORS
                    const response = await fetch(`${API_BASE}/api/auditoria/descarga`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        // Usamos _categoria dinámicamente, incluso si no hay filtro de categoría seleccionado
                        body: JSON.stringify({ tabla: selectedRecord._categoria, registro_id: selectedRecord.id })
                    });
                    if (response.ok) {
                        setAllData(prevData => prevData.map(row => row.id === selectedRecord.id ? { ...row, auditoria_estado: 'En revisión' } : row ));
                        setSelectedRecord(prev => ({ ...prev, auditoria_estado: 'En revisión' }));
                        setToast({ type: 'success', message: 'Registro puesto "En revisión" correctamente.' });
                        setTimeout(() => setToast(null), 5000);
                    } else {
                        const errData = await response.json();
                        setToast({ type: 'error', message: errData.message || 'Error al actualizar AWS.' });
                        setTimeout(() => setToast(null), 5000);
                    }
                } catch (err) {
                    console.error("No se pudo auditar la descarga:", err);
                    setToast({ type: 'error', message: 'Error de conexión con el servidor.' });
                    setTimeout(() => setToast(null), 5000);
                }
                const wb = XLSX.utils.book_new();
                const data = [["CAMPO FÍSICO", "VALOR ACTUAL EN SISTEMA", "NUEVO VALOR (ACTUALIZACIÓN)"]];
                selectedRecord._meta.editableKeys.forEach(k => { data.push([k.toUpperCase(), selectedRecord[k] || "--- VACÍO ---", ""]); });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), "Formulario");
                XLSX.writeFile(wb, `Plantilla_Edicion_${selectedRecord._meta.nombreValor}.xlsx`);
            };

            return (
                <div className="flex flex-col h-screen relative">
                    {toast && (
                        <div className="fixed top-20 right-6 z-[100] bg-white dark:bg-gray-800 shadow-2xl rounded-xl overflow-hidden flex flex-col min-w-[300px] border border-warm-100 dark:border-gray-700 slide-up">
                            <div className="p-4 flex items-center gap-3">
                                {toast.type === 'success' ? (
                                    <div className="w-8 h-8 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-600 dark:text-green-400 shrink-0"><i className="ph-fill ph-check-circle text-xl"></i></div>
                                ) : (
                                    <div className="w-8 h-8 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-600 dark:text-red-400 shrink-0"><i className="ph-fill ph-warning-circle text-xl"></i></div>
                                )}
                                <span className="text-sm font-bold text-gray-800 dark:text-gray-200">{toast.message}</span>
                            </div>
                            <div className="h-1.5 w-full bg-warm-100 dark:bg-gray-700">
                                <div className={`h-full ${toast.type === 'success' ? 'bg-green-500' : 'bg-primary'} animate-toast-progress`}></div>
                            </div>
                        </div>
                    )}

                    <header className="h-14 bg-navy-dark border-b-[3px] border-primary flex items-center justify-between px-5 z-30 shrink-0 shadow-md">
                        <div className="flex items-center space-x-5">
                            <div className="flex items-center space-x-3">
                                <img src={BADAJOZ_LOGO_PATH} alt="Badajoz" className="h-7 object-contain dark:invert" onError={(e) => e.target.style.display='none'} />
                                <img src={LOGO_PATH} alt="Timestamp" className="h-7 object-contain" onError={(e) => e.target.style.display='none'} />
                            </div>
                            <div className="h-6 w-px bg-gray-600 hidden sm:block"></div>
                            <span className="text-base font-bold text-white font-serif tracking-tight hidden sm:block">Auditoría Turística Badajoz</span>
                        </div>
                        <div className="flex items-center space-x-3">
                            <div className="flex items-center space-x-2 bg-slate-700/50 px-3 py-1 rounded-full border border-slate-600 text-xs text-gray-300">
                                <i className="ph ph-user-circle text-lg"></i>

        function App() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [token, setToken] = useState('');

            useEffect(() => { document.documentElement.classList.add('dark'); }, []);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    // 👉 Asegurarnos de apuntar a API_BASE para no tener problemas de CORS
                    const res = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if (res.ok) { setToken(data.token); setIsAuthenticated(true); }
                    else { setError(data.message || 'Error de acceso'); }
                } catch (err) { setError('Error de conexión.'); }
            };

            if (!isAuthenticated) {
                return (
                    <div className="relative flex min-h-screen items-center justify-center lg:justify-end overflow-hidden bg-[#0d1117] p-4 lg:pr-20 xl:pr-32">

                                src="./assets/fuerte-badajoz.jpg" 
                                alt="Alcazaba de Badajoz" 
                                className="w-full h-full object-cover blur-sm scale-105 opacity-50"
                                onError={(e) => { e.target.onerror = null; e.target.src = 'https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?q=80&w=2070&auto=format&fit=crop'; }}
                            />
                            <div className="absolute inset-0 bg-[#131920]/80 mix-blend-multiply"></div>
                        </div>

                        <div className="relative z-10 w-full sm:max-w-[420px] lg:max-w-none lg:w-[45%] xl:w-[35%] p-8 sm:p-10 bg-[#1C232D] rounded-[32px] shadow-2xl flex flex-col border border-white/5 mx-auto lg:mx-0">
                            <div className="mb-8 text-center flex flex-col items-center">
                                <img src={LOGO_PATH} alt="Timestamp" className="h-6 mb-8" onError={(e) => {
                                    e.target.style.display='none';
                                    document.getElementById('fallback-logo').style.display='block';
                                }} />
                                <div id="fallback-logo" className="hidden text-3xl font-black text-[#ED2125] tracking-tighter mb-8 lowercase italic">timestamp</div>
                                
                                <h2 className="text-[26px] font-bold tracking-tight text-white mb-1">Acceso Auditoría</h2>
                                <p className="text-[#64748B] font-bold text-[11px] uppercase tracking-[0.2em] mt-2">Data Quality Manager</p>
                            </div>

                            {error && (
                                <div className="bg-[#2a1318] text-[#F3484A] border border-[#4a1c22] px-5 py-4 rounded-xl text-sm font-bold mb-8 flex items-center gap-3 slide-up">
                                    <div className="bg-[#ED2125] text-white rounded-full w-5 h-5 flex items-center justify-center text-[10px] shrink-0">!</div>
                                    {error}
                                </div>
                            )}
                            
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase text-[#8B949E] tracking-widest block mb-2">Identificador</label>
                                    <input type="text" required value={email} onChange={e => setEmail(e.target.value)} 
                                        className="w-full px-5 py-4 bg-[#161B22] border border-[#30363D] rounded-xl outline-none focus:ring-1 focus:ring-[#ED2125] focus:border-[#ED2125] font-bold transition-all text-sm text-white placeholder-[#8B949E] shadow-inner" 
                                        placeholder="admin" />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-bold uppercase text-[#8B949E] tracking-widest block mb-2">Credencial</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)} 
                                        className="w-full px-5 py-4 bg-[#161B22] border border-[#30363D] rounded-xl outline-none focus:ring-1 focus:ring-[#ED2125] focus:border-[#ED2125] font-bold transition-all text-sm text-white placeholder-[#8B949E] shadow-inner" 
                                        placeholder="••••••••" />
                                </div>
                                <button type="submit" className="w-full bg-[#ED2125] hover:bg-[#c91d20] text-white py-4 rounded-xl font-bold text-base transition-all active:scale-95 mt-4">
                                    Iniciar Sesión
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }
            return <Dashboard userEmail={email} token={token} onLogout={() => setIsAuthenticated(false)} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
